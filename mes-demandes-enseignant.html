<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;display:flex;}

.sidebar{width:260px;height:100vh;background:#153A73;color:white;padding:30px 20px;position:fixed;top:0;left:0;overflow-y:auto;}
.sidebar img{height:65px;display:block;margin:auto;margin-bottom:25px;}
.sidebar a{display:block;color:white;text-decoration:none;padding:14px;margin-bottom:8px;border-radius:10px;transition:.3s;}
.sidebar a:hover{background:#0B63F6;}
.sidebar a.active{background:#0B63F6;}

.main{margin-left:260px;padding:35px;width:100%;max-width:800px;}

h1{color:#153A73;margin-bottom:20px;}

.demande{background:white;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px;}
.demande p{margin:6px 0;color:#333;}
.demande p strong{color:#153A73;}

.statut{display:inline-block;padding:6px 14px;border-radius:20px;font-weight:600;font-size:13px;margin-bottom:10px;}
.statut.en_attente{background:#fff4e0;color:#e08b00;}
.statut.confirmee{background:#e6f7ec;color:#28a745;}
.statut.refusee{background:#fdeaea;color:#d93025;}

.actions{margin-top:15px;display:flex;gap:12px;}
.actions button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;}
.btn-accepter{background:#28a745;color:white;}
.btn-refuser{background:#d93025;color:white;}

.empty{background:white;padding:40px;border-radius:20px;text-align:center;color:#999;box-shadow:0 10px 25px rgba(0,0,0,.08);}

</style>

</head>

<div class="main">

<h1>📨 Mes demandes de cours</h1>

<div id="listeDemandes"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const libellesStatut = {
    en_attente: "🟠 En attente",
    confirmee: "✅ Confirmée",
    refusee: "❌ Refusée"
};

async function chargerDemandes(identifiant) {

    const container = document.getElementById("listeDemandes");
    container.innerHTML = "";

    if (!identifiant) {
        container.innerHTML = `<div class="empty">Complétez d'abord votre profil (identifiant enseignant manquant) pour recevoir des demandes.</div>`;
        return;
    }

    try {

        const q = query(collection(db, "reservations"), where("enseignantId", "==", identifiant));
        const snap = await getDocs(q);

        if (snap.empty) {
            container.innerHTML = `<div class="empty">Aucune demande de cours pour le moment.</div>`;
            return;
        }

        snap.forEach((docSnap) => {

            const d = docSnap.data();
            const statut = d.statut || "en_attente";

            const el = document.createElement("div");
            el.className = "demande";

            el.innerHTML = `
                <span class="statut ${statut}">${libellesStatut[statut] || statut}</span>
                <p><strong>👤 Parent :</strong> ${d.parentNom || "—"}</p>
                <p><strong>📚 Matière :</strong> ${d.matiere || "—"}</p>
                <p><strong>📅 Date :</strong> ${d.date || "—"} à ${d.heure || "—"}</p>
                <p><strong>📍 Mode :</strong> ${d.mode || "—"} ${d.adresse ? "— " + d.adresse : ""}</p>
                <p><strong>💬 Message :</strong> ${d.message || "—"}</p>
                ${statut === "en_attente" ? `
                <div class="actions">
                    <button class="btn-accepter" data-id="${docSnap.id}">✔ Accepter</button>
                    <button class="btn-refuser" data-id="${docSnap.id}">✕ Refuser</button>
                </div>` : ""}
            `;

            container.appendChild(el);
        });

        container.querySelectorAll(".btn-accepter").forEach((btn) => {
            btn.addEventListener("click", async () => {
                await updateDoc(doc(db, "reservations", btn.dataset.id), { statut: "confirmee" });
                chargerDemandes(identifiant);
            });
        });

        container.querySelectorAll(".btn-refuser").forEach((btn) => {
            btn.addEventListener("click", async () => {
                await updateDoc(doc(db, "reservations", btn.dataset.id), { statut: "refusee" });
                chargerDemandes(identifiant);
            });
        });

    } catch (error) {
        container.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-enseignant.html";
        return;
    }

    const snap = await getDoc(doc(db, "enseignants", user.uid));
    const identifiant = snap.exists() ? snap.data().identifiant : null;

    chargerDemandes(identifiant);

});

document.getElementById("btnDeconnexion").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "connexion-enseignant.html";
});

</script>
