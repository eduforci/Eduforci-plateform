<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription Établissement | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(8,34,88,.85),rgba(8,34,88,.85)),url("images/hero.jpg");
background-size:cover;
background-position:center;
padding:40px 20px;
}

.form-box{
max-width:700px;
margin:auto;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
display:block;
margin:auto;
height:70px;
margin-bottom:20px;
}

h2{
text-align:center;
color:#0B63F6;
margin-bottom:30px;
}

label{
display:block;
margin:15px 0 6px;
font-weight:600;
color:#153A73;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
width:100%;
margin-top:25px;
padding:15px;
background:#0B63F6;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#084ec7;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#0B63F6;
}

</style>

</head>

<body>
  
<form class="form-box" id="formEtablissement">
  
<img src="images/logo.png" class="logo" alt="Logo EDUFORCI">

<h2>Inscription Établissement</h2>

<label>Nom de l'établissement</label>
<input type="text" id="nom" required>

<label>Nom du responsable</label>
<input type="text" id="responsable" required>

<label>Téléphone</label>
<input type="tel" id="telephone" required>

<label>Adresse e-mail</label>
<input type="email" id="email" required>

<label>Ville</label>
<input type="text" id="ville" required>

<label>Adresse</label>
<input type="text" id="adresse" required>

<label>Type d'établissement</label>
<select>
<option>Choisir...</option>
<option>Public</option>
<option>Privé</option>
</select id="type" required>

<label>Niveaux enseignés</label>
<input type="text" id="niveaux" required>

<label>Description</label>
<textarea id="description"></textarea>

<label>Logo de l'établissement</label>
<input type="file">

<label>Mot de passe</label>
<input type="password" id="password" required>

<label>Confirmer le mot de passe</label>
<input type="password" id="confirmPassword" required>
<button type="submit">
Créer le compte Établissement
</button>
  
<div class="links">

<a href="connexion-etablissement.html">J'ai déjà un compte</a>

</div>

</form>
<script type="module">

import { creerCompteEtablissement } from "./js/auth.js";

const type= document.getElementById("type"). value;

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const responsable = document.getElementById("responsable").value;
    const telephone = document.getElementById("telephone").value;
    const email = document.getElementById("email").value;
    const ville = document.getElementById("ville").value;
    const adresse = document.getElementById("adresse").value;
    const type = document.getElementById("type").value;
    const niveaux = document.getElementById("niveaux").value;
    const description = document.getElementById("description").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    await creerCompteEtablissement(
        nom,
        responsable,
        telephone,
        email,
        ville,
        adresse,
        type,
        niveaux,
        description,
        password
    );

});

</script>
</body>
</html>
