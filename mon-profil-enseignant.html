<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon profil | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f4f7fb;display:flex;}

.sidebar{width:260px;height:100vh;background:#153A73;color:white;padding:30px 20px;position:fixed;top:0;left:0;overflow-y:auto;}
.sidebar img{height:65px;display:block;margin:auto;margin-bottom:25px;}
.sidebar a{display:block;color:white;text-decoration:none;padding:14px;margin-bottom:8px;border-radius:10px;transition:.3s;}
.sidebar a:hover{background:#0B63F6;}
.sidebar a.active{background:#0B63F6;}

.main{margin-left:260px;padding:35px;width:100%;max-width:700px;}

.card{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:25px;}
h1{color:#153A73;margin-bottom:20px;}

label{display:block;margin:15px 0 8px;font-weight:600;color:#153A73;}
input,select{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;font-size:15px;}
input[disabled]{background:#f0f2f6;color:#888;}

button{width:100%;padding:15px;margin-top:25px;background:#0B63F6;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;}
button:hover{background:#084ec7;}

.msg{margin-top:15px;padding:14px;border-radius:10px;font-weight:600;display:none;}
.msg.ok{background:#e6f7ec;color:#28a745;}
.msg.err{background:#fdeaea;color:#d93025;}

</style>

</head>
<body>

<div class="sidebar">
<img src="logo.png" alt="EDUFORCI">
<a href="dashboard-enseignant.html">🏠 Tableau de bord</a>
<a href="mon-profil-enseignant.html" class="active">👤 Mon profil</a>
<a href="mes-matieres-enseignant.html">📚 Mes matières</a>
<a href="mes-disponibilites-enseignant.html">📅 Mes disponibilités</a>
<a href="mes-demandes-enseignant.html">📨 Mes demandes</a>
<a href="messages-enseignant.html">💬 Messages</a>
<a href="avis-enseignant.html">⭐ Avis</a>
<a href="parametres-enseignant.html">⚙️ Paramètres</a>
<a href="#" id="btnDeconnexion">🚪 Déconnexion</a>
</div>

<div class="main">

<div class="card">
<h1>👤 Mon profil</h1>

<label>Nom complet</label>
<input id="nom" type="text" placeholder="Votre nom">

<label>Identifiant</label>
<input id="identifiant" type="text" disabled>

<label>Email</label>
<input id="email" type="text" disabled>

<label>Ville</label>
<input id="ville" type="text" placeholder="Ex : Abidjan">

<label>Matière principale</label>
<input id="matiere" type="text" placeholder="Ex : Mathématiques">

<label>Niveau enseigné</label>
<select id="niveau">
<option value="Primaire">Primaire</option>
<option value="Collège">Collège</option>
<option value="Lycée">Lycée</option>
<option value="Tous niveaux">Tous niveaux</option>
</select>

<label>Années d'expérience</label>
<input id="experience" type="number" min="0" placeholder="Ex : 3">
<label>Statut de disponibilité</label>

<select id="statut">
    <option value="Disponible">🟢 Disponible</option>
    <option value="Indisponible">🔴 Indisponible</option>
</select>
<button id="btnEnregistrer">💾 Enregistrer les modifications</button>

<div class="msg ok" id="msgOk">✔ Profil mis à jour avec succès.</div>
<div class="msg err" id="msgErr">Une erreur est survenue.</div>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let uid = null;

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-enseignant.html";
        return;
    }

    uid = user.uid;

    const refDoc = doc(db, "enseignants", uid);
    const snap = await getDoc(refDoc);

    if (snap.exists()) {
        const data = snap.data();
        document.getElementById("nom").value = data.nom || "";
        document.getElementById("identifiant").value = data.identifiant || "";
        document.getElementById("email").value = data.email || user.email || "";
        document.getElementById("ville").value = data.ville || "";
        document.getElementById("matiere").value = data.matiere || "";
        document.getElementById("niveau").value = data.niveau || "Primaire";
        document.getElementById("experience").value = data.experience || "";
        document.getElementById("statut").value = data.disponibilite || "Disponible";
    } else {
        document.getElementById("email").value = user.email || "";
    }

});

document.getElementById("btnEnregistrer").addEventListener("click", async () => {

    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");
    msgOk.style.display = "none";
    msgErr.style.display = "none";

    if (!uid) return;

    try {

        await updateDoc(doc(db, "enseignants", uid), {
            nom: document.getElementById("nom").value.trim(),
            ville: document.getElementById("ville").value.trim(),
            matiere: document.getElementById("matiere").value.trim(),
            niveau: document.getElementById("niveau").value,
            experience: document.getElementById("experience").value
        });

        msgOk.style.display = "block";

    } catch (error) {
        msgErr.textContent = error.message;
        msgErr.style.display = "block";
    }

});

document.getElementById("btnDeconnexion").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "connexion-enseignant.html";
});

</script>

</body>
</html>
