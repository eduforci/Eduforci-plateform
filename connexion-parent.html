<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion Parent | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(rgba(8,34,88,.85),rgba(8,34,88,.85)),url("images/hero.jpg");

background-size:cover;

background-position:center;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.form-box{

background:#fff;

width:380px;

padding:40px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.logo{

display:block;

margin:auto;

height:70px;

margin-bottom:20px;

}

h2{

text-align:center;

color:#0B63F6;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#0B63F6;

color:#fff;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

display:block;

margin:8px 0;

text-decoration:none;

color:#0B63F6;

}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;bottom:20px;left:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Accueil</a>


<form class="form-box" id="formConnexion">

<img src="logo.png" class="logo">

<h2>Connexion Parent</h2>

<input type="email" id="email" placeholder="Adresse e-mail" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<button type="submit" id="btnConnexion"> Se connecter</button>

<div class="links">

<a href="#">Mot de passe oublié ?</a>

<a href="inscription-parent.html">Créer un compte Parent</a>

</div>

</form>
  <script type="module">

import { connexionParent } from "./js/auth.js";

const form = document.getElementById("formConnexion");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    await connexionParent(email, password);

});

</script>
</body>

</html>
