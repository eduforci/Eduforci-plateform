.menu-toggle{display:none;position:fixed;top:20px;left:20px;z-index:100000;background:#153A73;color:#fff;border:none;width:48px;height:48px;border-radius:12px;font-size:20px;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.25);cursor:pointer;}

<div class="main">

<div class="welcome">

<h1>⚙️ Paramètres</h1>

<p>Gérez vos informations personnelles et votre sécurité.</p>

</div>

<div class="welcome">

<h2 style="color:#153A73;">Mes informations</h2>

<label>Nom et prénom</label>
<input type="text" id="nom">

<label>Téléphone</label>
<input type="tel" id="telephone">

<label>Adresse e-mail</label>
<input type="email" id="email" disabled>

<button id="btnEnregistrerProfil">Enregistrer les modifications</button>

</div>

<div class="welcome">

<h2 style="color:#153A73;">Changer le mot de passe</h2>

<label>Nouveau mot de passe</label>
<input type="password" id="nouveauMotDePasse" placeholder="Au moins 6 caractères">

<label>Confirmer le nouveau mot de passe</label>
<input type="password" id="confirmerMotDePasse">

<button id="btnChangerMotDePasse">Changer le mot de passe</button>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let parentConnecte = null;

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-parent.html";
        return;
    }

    parentConnecte = user;

    const docSnap = await getDoc(doc(db, "parents", user.uid));

    if (docSnap.exists()) {
        const parent = docSnap.data();
        document.getElementById("nom").value = parent.nom || "";
        document.getElementById("telephone").value = parent.telephone || "";
        document.getElementById("email").value = parent.email || "";
    }

});

document.getElementById("btnEnregistrerProfil").addEventListener("click", async () => {

    if (!parentConnecte) return;

    const nom = document.getElementById("nom").value.trim();
    const telephone = document.getElementById("telephone").value.trim();

    if (!nom || !telephone) {
        alert("Merci de remplir le nom et le téléphone.");
        return;
    }

    try {

        await updateDoc(doc(db, "parents", parentConnecte.uid), {
            nom: nom,
            telephone: telephone
        });

        alert("Vos informations ont été mises à jour avec succès !");

    } catch (error) {
        alert(error.message);
    }

});

document.getElementById("btnChangerMotDePasse").addEventListener("click", async () => {

    if (!parentConnecte) return;

    const nouveau = document.getElementById("nouveauMotDePasse").value;
    const confirmer = document.getElementById("confirmerMotDePasse").value;

    if (!nouveau || nouveau.length < 6) {
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
    }

    if (nouveau !== confirmer) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    try {

        await updatePassword(parentConnecte, nouveau);
        alert("Votre mot de passe a été changé avec succès !");
        document.getElementById("nouveauMotDePasse").value = "";
        document.getElementById("confirmerMotDePasse").value = "";

    } catch (error) {

        if (error.code === "auth/requires-recent-login") {
            alert("Pour des raisons de sécurité, veuillez vous déconnecter et vous reconnecter avant de changer votre mot de passe.");
        } else {
            alert(error.message);
        }

    }

});

</script>


<script>
(function(){
  const btn = document.getElementById("menuToggleEduforci");
  const overlay = document.getElementById("sidebarOverlayEduforci");
  const sidebar = document.querySelector(".sidebar");
  if(!btn||!sidebar) return;
  function ouvrir(){ sidebar.classList.add("ouvert"); overlay.classList.add("ouvert"); }
  function fermer(){ sidebar.classList.remove("ouvert"); overlay.classList.remove("ouvert"); }
  btn.addEventListener("click", function(){ sidebar.classList.contains("ouvert") ? fermer() : ouvrir(); });
  overlay.addEventListener("click", fermer);
  sidebar.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", fermer); });
})();
</script>
