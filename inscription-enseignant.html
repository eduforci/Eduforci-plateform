<!DOCTYPE html>
<html lang="fr">

<head>
<script src="js/notify.js?v=4"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Enseignant | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
background-size:cover;
background-position:center;
padding:40px 20px;
}

.form-box{
max-width:700px;
margin:auto;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
display:block;
margin:auto;
height:70px;
margin-bottom:20px;
}

h2{
text-align:center;
color:#0B63F6;
margin-bottom:30px;
}

label{
display:block;
margin:15px 0 6px;
font-weight:600;
color:#153A73;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

.checkbox-group{
margin-top:10px;
}

.checkbox-group label{
display:inline-block;
margin-right:20px;
font-weight:400;
}

button{
width:100%;
margin-top:25px;
padding:15px;
background:#0B63F6;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#084ec7;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
text-decoration:none;
color:#0B63F6;
}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>

<form class="form-box" id="formEnseignant">
<img decoding="async" src="logo.png" class="logo" alt="Logo EDUFORCI">

<h2>Inscription Enseignant</h2>

<label>Nom et prénom</label>
<input type="text" id="nom" required>

<label>Téléphone</label>
<input type="tel" id="telephone" required>

<label>Adresse e-mail</label>
<input type="email" id="email" required>

<label>Ville</label>
<input type="text" id="ville" required>

<label>Matière enseignée</label>
<input type="text" id="matiere" placeholder="Ex : Mathématiques, Anglais..." required>

<label>Niveau enseigné</label>
<select id="niveau" required>
<option value="">Choisir...</option>
<option>Primaire</option>
<option>Collège</option>
<option>Lycée</option>
<option>Université</option>
</select>

<label>Années d'expérience</label>
<input type="number" id="experience" required>

<label>Diplôme le plus élevé</label>
<input type="text" id="diplome" required>

<label>Présentation</label>
<textarea id="presentation" placeholder="Présentez-vous en quelques lignes..." required></textarea>

<label>Mode d'enseignement</label>
<div class="checkbox-group">
<label><input type="checkbox"> À domicile</label>
<label><input type="checkbox"> En ligne</label>
</div>

<label>Photo de profil</label>
<input type="file">

<label>CV (PDF)</label>
<input type="file">

<label>Mot de passe</label>
<input type="password" id="password" required>

<label>Confirmer le mot de passe</label>
<input type="password" id="confirmPassword" required>

<button type="submit" id="btnInscription">
Créer mon compte Enseignant
</button>

<div class="links">
<a href="connexion-enseignant.html">J'ai déjà un compte</a>
</div>

</form>

<script type="module">

import { creerCompteEnseignant } from "./js/auth.js?v=3";

const form = document.getElementById("formEnseignant");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const telephone = document.getElementById("telephone").value;
    const email = document.getElementById("email").value;
    const ville = document.getElementById("ville").value;
    const matiere = document.getElementById("matiere").value;
    const niveau = document.getElementById("niveau").value;
    const experience = document.getElementById("experience").value;
    const diplome = document.getElementById("diplome").value;
    const presentation = document.getElementById("presentation").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    await creerCompteEnseignant(
        nom,
        telephone,
        email,
        ville,
        matiere,
        niveau,
        experience,
        diplome,
        presentation,
        password
    );

});

</script>
</body>
    </html>
