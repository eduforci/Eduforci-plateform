body{

width:260px;
height:100vh;
background:#153A73;
color:white;
padding:30px 20px;

top:0;
left:0;
}

.sidebar img{
height:65px;
display:block;
margin:auto;

}

.sidebar a{

padding:14px;

border-radius:10px;
text-decoration:none;
color:white;
transition:.3s;
}

.sidebar a:hover{
background:#0B63F6;
}

.sidebar a.active{
background:#0B63F6;
}

.main{
margin-left:260px;
padding:35px;
width:100%;
}

.welcome{

padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.avis-item{
padding:20px;

background:#f8f9fc;

}

.avis-item .meta{
color:#666;
font-size:13px;
margin-bottom:8px;
}

.avis-item .note{

margin-bottom:8px;
}

.avis-item .commentaire{

}

.vide{

}

}

</style>

<div class="main">

<div class="welcome">

<h1>⭐ Mes avis</h1>

<p>Retrouvez ici tous les avis que vous avez publiés sur les enseignants.</p>

</div>

<div class="welcome">

<div id="listeAvis"></div>

<div id="messageVide" class="vide" style="display:none;">

Vous n'avez publié aucun avis pour le moment. <br><br>

<a href="recherche.html">Trouver un professeur →</a>

</div>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-parent.html";
        return;
    }

    const liste = document.getElementById("listeAvis");
    const messageVide = document.getElementById("messageVide");

    try {

        const q = query(collection(db, "avis"), where("parentId", "==", user.uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            messageVide.style.display = "block";
            return;
        }

        const avisListe = [];
        snap.forEach((docSnap) => avisListe.push(docSnap.data()));

        avisListe.sort((a, b) => new Date(b.dateAvis) - new Date(a.dateAvis));

        avisListe.forEach((a) => {

            const date = new Date(a.dateAvis).toLocaleDateString("fr-FR");
            const etoiles = "⭐".repeat(a.note || 0);

            const div = document.createElement("div");
            div.className = "avis-item";
            div.innerHTML = `
                <div class="meta">${a.enseignantNom || "Enseignant"} · ${date}</div>
                <div class="note">${etoiles} (${a.note}/5)</div>
                <div class="commentaire">${a.commentaire}</div>
            `;
            liste.appendChild(div);

        });

    } catch (error) {
        alert(error.message);
    }

});

</script>

</body>
