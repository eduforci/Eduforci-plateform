<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
display:flex;
}

.sidebar{
width:260px;
height:100vh;
background:#153A73;
color:white;
padding:30px 20px;
position:fixed;
top:0;
left:0;
}

.sidebar img{
height:65px;
display:block;
margin:auto;
margin-bottom:25px;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:10px;
text-decoration:none;
color:white;
transition:.3s;
}

.sidebar a:hover{
background:#0B63F6;
}

.sidebar a.active{
background:#0B63F6;
}

.main{
margin-left:260px;
padding:35px;
width:100%;
max-width:700px;
}

.welcome{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

label{
display:block;
margin:15px 0 8px;
font-weight:600;
color:#153A73;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:100px;
}

button{
width:100%;
margin-top:25px;
padding:15px;
background:#0B63F6;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#084ec7;
}

.matieres-grille{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:5px;}
.matiere-case{display:flex;align-items:center;gap:8px;background:#f8f9fc;border:1px solid #ddd;border-radius:10px;padding:10px 12px;font-size:14px;font-weight:500;color:#333;cursor:pointer;}
.matiere-case input{width:auto;padding:0;}
.matiere-case.tout{grid-column:1/-1;background:#eaf1ff;color:#0B63F6;font-weight:600;}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>


<div class="sidebar">

<img src="logo.png" alt="EDUFORCI">

<a href="dashboard-etablissement.html">🏠 Tableau de bord</a>

<a href="publier-offre.html" class="active">📢 Publier une offre</a>

<a href="recherche-enseignant-etablissement.html">👨‍🏫 Rechercher un enseignant</a>

<a href="demande-mission-etablissement.html">🎯 Demander un enseignant</a>

<a href="mes-missions-etablissement.html">📋 Mes demandes</a>

<a href="candidatures-etablissement.html">📩 Candidatures reçues</a>

<a href="mon-etablissement.html">🏫 Mon établissement</a>

<a href="parametres-etablissement.html">⚙️ Paramètres</a>

<a href="index.html" id="btnDeconnexion">🚪 Déconnexion</a>

</div>

<div class="main">

<div class="welcome">

<h1 style="color:#153A73;margin-bottom:10px;">📢 Publier une offre d'emploi</h1>

<p style="color:#666;margin-bottom:20px;">Décrivez le poste pour attirer les meilleurs enseignants.</p>

<label>Intitulé du poste</label>
<input type="text" id="poste" placeholder="Ex : Professeur de Mathématiques" required>

<label>Matière</label>
<div class="matieres-grille" id="matieresGrille">
<label class="matiere-case tout"><input type="checkbox" id="matiereTout" value="__tout__"> Toutes les matières</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Mathématiques"> Mathématiques</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Anglais"> Anglais</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="PC"> PC</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="SVT"> SVT</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Français"> Français</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="EPS"> EPS</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="EDHC"> EDHC</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Musique"> Musique</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Arts plastiques"> Arts plastiques</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Philosophie"> Philosophie</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Allemand"> Allemand</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="Espagnol"> Espagnol</label>
<label class="matiere-case"><input type="checkbox" class="matiere-item" value="HG"> HG</label>
</div>

<label>Niveau</label>
<select id="niveau" required>
<option value="">Choisir...</option>
<option>Primaire</option>
<option>1er cycle</option>
<option>2nd cycle</option>
<option>Universitaire</option>
</select>

<label>Ville</label>
<input type="text" id="ville" required>

<label>Type de contrat</label>
<select id="typeContrat" required>
<option value="">Choisir...</option>
<option>CDD</option>
<option>CDI</option>
<option>Vacataire</option>
</select>

<label>Rémunération proposée</label>
<div style="display:flex;align-items:center;gap:10px;">
<input type="number" id="remuneration" min="0" placeholder="Ex : 150000" style="flex:1;">
<span style="font-size:14px;color:#555;white-space:nowrap;">FCFA / mois</span>
</div>

<label>Description du poste</label>
<textarea id="description" placeholder="Décrivez les missions, exigences, horaires..." required></textarea>

<button id="btnPublier">✅ Publier l'offre</button>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let etablissementConnecte = null;

const TOUTES_LES_MATIERES = ["Mathématiques","Anglais","PC","SVT","Français","EPS","EDHC","Musique","Arts plastiques","Philosophie","Allemand","Espagnol","HG"];

const caseTout = document.getElementById("matiereTout");
const casesMatiere = document.querySelectorAll(".matiere-item");

caseTout.addEventListener("change", () => {
    casesMatiere.forEach(c => c.checked = caseTout.checked);
});

casesMatiere.forEach(c => {
    c.addEventListener("change", () => {
        caseTout.checked = Array.from(casesMatiere).every(x => x.checked);
    });
});

function matieresSelectionnees() {
    if (caseTout.checked) return TOUTES_LES_MATIERES.slice();
    return Array.from(casesMatiere).filter(c => c.checked).map(c => c.value);
}

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-etablissement.html";
        return;
    }

    etablissementConnecte = user;

});

document.getElementById("btnPublier").addEventListener("click", async () => {

    if (!etablissementConnecte) {
        alert("Veuillez vous connecter pour publier une offre.");
        return;
    }

    const poste = document.getElementById("poste").value.trim();
    const matieres = matieresSelectionnees();
    const matiere = matieres.join(", ");
    const niveau = document.getElementById("niveau").value;
    const ville = document.getElementById("ville").value.trim();
    const typeContrat = document.getElementById("typeContrat").value;
    const montantRemuneration = document.getElementById("remuneration").value.trim();
    const remuneration = montantRemuneration ? `${Number(montantRemuneration).toLocaleString("fr-FR")} FCFA / mois` : "";
    const description = document.getElementById("description").value.trim();

    if (!poste || matieres.length === 0 || !niveau || !ville || !typeContrat || !description) {
        alert("Merci de remplir tous les champs obligatoires (dont au moins une matière).");
        return;
    }

    try {

        const etabSnap = await getDoc(doc(db, "etablissements", etablissementConnecte.uid));
        const etabNom = etabSnap.exists() ? etabSnap.data().nom : "Établissement";

        await addDoc(collection(db, "offres"), {
            etablissementId: etablissementConnecte.uid,
            etablissementNom: etabNom,
            poste: poste,
            matiere: matiere,
            matieres: matieres,
            niveau: niveau,
            ville: ville,
            typeContrat: typeContrat,
            remuneration: remuneration,
            description: description,
            statut: "active",
            dateCreation: new Date().toISOString()
        });

        alert("Votre offre a été publiée avec succès !");
        window.location.href = "dashboard-etablissement.html";

    } catch (error) {
        alert(error.message);
    }

});

</script>

</body>

                        </html>
