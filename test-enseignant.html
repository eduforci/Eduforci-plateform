<!DOCTYPE html>
<html lang="fr">
<head>
<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de recrutement | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(rgba(5,32,78,.85),rgba(5,32,78,.85)),url("hero.jpg") center center/cover fixed no-repeat;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.conteneur{width:100%;max-width:680px;}

.card{background:white;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,.25);overflow:hidden;}

/* --- écran d'état (accès refusé / chargement / terminé) --- */
.etat{padding:60px 40px;text-align:center;}
.etat .emoji{font-size:50px;margin-bottom:18px;}
.etat h2{color:#153A73;margin-bottom:12px;}
.etat p{color:#666;line-height:1.6;margin-bottom:22px;}
.etat a{display:inline-block;padding:14px 28px;background:#0B63F6;color:white;text-decoration:none;border-radius:10px;font-weight:600;}
.etat a:hover{background:#084ec7;}

/* --- écran d'accueil --- */
.accueil{padding:40px;text-align:center;}
.accueil .logo{font-size:38px;margin-bottom:6px;}
.accueil h1{color:#153A73;font-size:20px;letter-spacing:.5px;margin-bottom:4px;}
.accueil .bienvenue{color:#333;font-size:17px;margin:18px 0 22px;}
.infos-test{display:flex;justify-content:center;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
.infos-test div{background:#f4f7fc;padding:12px 16px;border-radius:12px;min-width:80px;}
.infos-test .val{color:#0B63F6;font-weight:700;font-size:14.5px;}
.infos-test .lbl{color:#888;font-size:11.5px;margin-top:2px;}

.certif{display:flex;align-items:flex-start;gap:10px;text-align:left;background:#fff8e1;padding:14px 16px;border-radius:12px;margin-bottom:10px;}
.certif input{margin-top:3px;width:18px;height:18px;flex-shrink:0;}
.certif label{color:#7a5c00;font-size:13.5px;line-height:1.5;}
.certif:last-of-type{margin-bottom:22px;}

button.demarrer{width:100%;padding:16px;background:#0B63F6;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
button.demarrer:hover{background:#084ec7;}
button.demarrer:disabled{background:#ccc;cursor:not-allowed;}

/* --- écran de test --- */
.entete-test{background:#153A73;color:white;padding:18px 26px;display:flex;justify-content:space-between;align-items:center;}
.entete-test .logo{font-weight:700;}
.chrono{font-weight:700;font-size:18px;font-variant-numeric:tabular-nums;}
.chrono.urgent{color:#ff6b6b;}

.progression-zone{padding:16px 26px 0;}
.progression-txt{color:#666;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;}
.barre-progression{height:10px;background:#eee;border-radius:10px;overflow:hidden;}
.barre-progression-remplie{height:100%;background:#0B63F6;transition:width .3s;}

.zone-question{padding:32px 26px;}
.zone-question h2{color:#153A73;font-size:19px;line-height:1.5;margin-bottom:26px;}

.choix{display:block;padding:16px 18px;border:2px solid #eee;border-radius:12px;margin-bottom:14px;cursor:pointer;transition:.2s;font-size:15px;color:#333;}
.choix:hover{border-color:#c6d9ff;}
.choix.selectionne{border-color:#0B63F6;background:#eaf1ff;color:#0B63F6;font-weight:600;}
.choix input{margin-right:12px;}

.nav-test{display:flex;justify-content:space-between;padding:0 26px 12px;gap:12px;}
.nav-test button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14.5px;}
.btn-precedent{background:#f0f0f0;color:#555;}
.btn-precedent:hover{background:#e2e2e2;}
.btn-precedent:disabled{opacity:.4;cursor:not-allowed;}
.btn-suivant{background:#0B63F6;color:white;}
.btn-suivant:hover{background:#084ec7;}
.btn-suivant:disabled{opacity:.4;cursor:not-allowed;}

.nav-test-secondaire{display:flex;justify-content:space-between;padding:0 26px 30px;gap:12px;}
.nav-test-secondaire button{flex:1;padding:13px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13.5px;}
.btn-marquer{background:#fff4e0;color:#e08b00;}
.btn-marquer:hover{background:#ffe9c2;}
.btn-marquer.actif{background:#e08b00;color:white;}
.btn-terminer{background:#28a745;color:white;}
.btn-terminer:hover{background:#1f7a35;}

.panneau-questions{padding:14px 26px 6px;}
.panneau-titre{color:#888;font-size:11.5px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.grille-questions{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:7px;margin-bottom:12px;}
.chip-question{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #eee;color:#999;background:white;position:relative;}
.chip-question.chip-actuel{border-color:#0B63F6;color:#0B63F6;background:#eaf1ff;}
.chip-question.chip-repondue{background:#e6f7ec;border-color:#28a745;color:#28a745;}
.chip-question.chip-marquee{border-color:#e08b00;}
.chip-question.chip-marquee::after{content:"🚩";position:absolute;top:-8px;right:-6px;font-size:11px;}
.legende-questions{display:flex;gap:14px;flex-wrap:wrap;color:#888;font-size:11.5px;margin-bottom:6px;}
.legende-questions span{display:flex;align-items:center;gap:5px;}
.legende-puce{width:11px;height:11px;border-radius:3px;display:inline-block;}

/* --- overlay anti-triche --- */
.overlay-avertissement{display:none;position:fixed;inset:0;background:rgba(140,20,20,.94);z-index:999999;align-items:center;justify-content:center;padding:24px;}
.overlay-avertissement.visible{display:flex;}
.avertissement-box{background:white;border-radius:20px;padding:36px 30px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.4);}
.avertissement-icone{font-size:48px;margin-bottom:14px;}
.avertissement-box h2{color:#d93025;font-size:19px;margin-bottom:10px;}
.avertissement-box p{color:#555;line-height:1.6;margin-bottom:18px;font-size:14.5px;}
.avertissement-compteur{display:inline-block;background:#fdeaea;color:#d93025;padding:8px 18px;border-radius:30px;font-weight:700;font-size:13.5px;margin-bottom:22px;}
.avertissement-box button{width:100%;padding:14px;background:#d93025;color:white;border:none;border-radius:10px;font-weight:700;font-size:14.5px;cursor:pointer;}
.avertissement-box button:hover{background:#a8221a;}

.gate-plein-ecran{padding:50px 40px;text-align:center;}
.gate-plein-ecran .emoji{font-size:44px;margin-bottom:16px;}
.gate-plein-ecran h2{color:#153A73;margin-bottom:12px;}
.gate-plein-ecran p{color:#666;line-height:1.6;margin-bottom:24px;}

</style>

</head>
<body>

<div class="conteneur">
<div class="card" id="carte"></div>
</div>

<div class="overlay-avertissement" id="overlayAvertissement">
    <div class="avertissement-box">
        <div class="avertissement-icone">⚠️</div>
        <h2 id="avertissementTitre">Avertissement</h2>
        <p id="avertissementTexte"></p>
        <div class="avertissement-compteur" id="avertissementCompteur"></div>
        <button id="btnRevenirTest">J'ai compris, je reviens au test</button>
    </div>
</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let DUREE_SECONDES = 60 * 60;   // 60 minutes par défaut, ajustable via candidature.parametresTest
let NB_QUESTIONS = 30;
let TENTATIVES_AUTORISEES = 1;
let EXPIRATION_HEURES = 72;
const MAX_AVERTISSEMENTS = 3;

let uid = null;
let candidature = null;
let test = null;               // état complet du testsRecrutement/{uid}
let indexActuel = 0;
let intervalChrono = null;
let avertissements = 0;
let enPause = false;
let finalisationEnCours = false;
let prochaineTentative = 1;

const carte = document.getElementById("carte");

function genererSessionId() {
    const d = new Date();
    const jour = d.getFullYear().toString() + String(d.getMonth() + 1).padStart(2, "0") + String(d.getDate()).padStart(2, "0");
    const alea = Array.from({ length: 6 }, () => "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"[Math.floor(Math.random() * 36)]).join("");
    return `SESSION-${jour}-${alea}`;
}

function melanger(tableau) {
    const t = [...tableau];
    for (let i = t.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [t[i], t[j]] = [t[j], t[i]];
    }
    return t;
}

// ==========================================================
// PLEIN ÉCRAN (non disponible sur tous les navigateurs, ex. Safari iOS —
// dans ce cas on continue simplement sans pénaliser le candidat)
// ==========================================================

function pleinEcranDisponible() {
    return !!(document.documentElement.requestFullscreen);
}

async function entrerPleinEcran() {
    if (!pleinEcranDisponible()) return;
    try { await document.documentElement.requestFullscreen(); } catch (error) { console.warn("Plein écran indisponible :", error.message); }
}

function sortirPleinEcran() {
    if (document.fullscreenElement) { document.exitFullscreen().catch(() => {}); }
}

// ==========================================================
// ÉCRANS D'ÉTAT (accès refusé / déjà passé / etc.)
// ==========================================================

function afficherEtat(emoji, titre, message, lienRetour = true) {
    carte.innerHTML = `
        <div class="etat">
            <div class="emoji">${emoji}</div>
            <h2>${titre}</h2>
            <p>${message}</p>
            ${lienRetour ? `<a href="dashboard-enseignant.html">Retour au tableau de bord</a>` : ""}
        </div>`;
}

// ==========================================================
// AUTHENTIFICATION + VÉRIFICATION D'ACCÈS
// ==========================================================

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-enseignant.html";
        return;
    }

    uid = user.uid;
    afficherEtat("⏳", "Chargement...", "Vérification de votre dossier en cours.", false);

    const candSnap = await getDoc(doc(db, "candidaturesRecrutement", uid));

    if (!candSnap.exists()) {
        afficherEtat("📝", "Aucune candidature", "Vous devez d'abord soumettre votre dossier de candidature.");
        return;
    }

    candidature = candSnap.data();

    if (candidature.statut === "refuse") {
        afficherEtat("❌", "Candidature refusée", "Votre candidature n'a pas été retenue. Le test de recrutement n'est pas accessible.");
        return;
    }

    const parametres = candidature.parametresTest || {};
    DUREE_SECONDES = (parametres.dureeMinutes || 60) * 60;
    NB_QUESTIONS = parametres.nombreQuestions || 30;
    TENTATIVES_AUTORISEES = parametres.tentativesAutorisees || 1;
    EXPIRATION_HEURES = parametres.expirationHeures || 72;

    const testSnap = await getDoc(doc(db, "testsRecrutement", uid));
    test = testSnap.exists() ? testSnap.data() : null;

    if (test && test.terminé) {
        const tentativeActuelle = test.tentativeNumero || 1;
        if (tentativeActuelle >= TENTATIVES_AUTORISEES) {
            afficherEtat("✔️", "Test déjà réalisé", `Vous avez déjà passé le test de recrutement le ${new Date(test.fin).toLocaleDateString("fr-FR")} (tentative ${tentativeActuelle}/${TENTATIVES_AUTORISEES}). Le résultat vous sera communiqué par l'équipe EDUFORCI.`);
            return;
        }
        // il reste une tentative disponible : le candidat repart sur un écran d'accueil neuf
        prochaineTentative = tentativeActuelle + 1;
        test = null;
    }

    if (test && test.statut === "en_cours") {
        // Reprise d'un test interrompu
        avertissements = test.avertissements || 0;
        try {
            await updateDoc(doc(db, "testsRecrutement", uid), { actualisations: (test.actualisations || 0) + 1 });
        } catch (error) {
            console.warn("Suivi actualisation échoué :", error.message);
        }
        afficherGateReprise();
        return;
    }

    if (candidature.statut !== "test_autorise") {
        afficherEtat("🔒", "Vous n'êtes pas encore autorisé à passer le test.", "Votre dossier doit d'abord être validé par l'équipe EDUFORCI. Consultez le statut de votre candidature pour plus de détails.");
        return;
    }

    const expiration = calculerExpiration();

    if (expiration && Date.now() > expiration.getTime()) {
        afficherEtat("⏰", "Délai expiré", `Le délai pour passer ce test (jusqu'au ${formaterDateExpiration(expiration)}) est dépassé. Contactez l'équipe EDUFORCI si vous pensez qu'il s'agit d'une erreur.`);
        return;
    }

    afficherEcranAccueil(expiration);

});

function trouverDateAutorisationTest() {
    const entrees = (candidature.historique || []).filter(h => h.action && h.action.startsWith("Test autorisé"));
    return entrees.length ? entrees[entrees.length - 1].date : null;
}

function calculerExpiration() {
    const dateAutorisation = trouverDateAutorisationTest();
    if (!dateAutorisation) return null;
    return new Date(new Date(dateAutorisation).getTime() + EXPIRATION_HEURES * 60 * 60 * 1000);
}

function formaterDateExpiration(dateExpiration) {
    return dateExpiration.toLocaleDateString("fr-FR", { day: "numeric", month: "long" }) + " à 23h59";
}

// ==========================================================
// REPRISE D'UN TEST INTERROMPU
// ==========================================================

function afficherGateReprise() {
    carte.innerHTML = `
        <div class="gate-plein-ecran">
            <div class="emoji">🔄</div>
            <h2>Reprise de votre test</h2>
            <p>Votre test était en cours. Cliquez ci-dessous pour continuer là où vous en étiez, en plein écran.</p>
            <button class="demarrer" id="btnReprendre">▶ Reprendre le test</button>
        </div>`;
    document.getElementById("btnReprendre").addEventListener("click", async () => {
        await entrerPleinEcran();
        demarrerEcranTest();
    });
}

// ==========================================================
// ÉCRAN D'ACCUEIL
// ==========================================================

function afficherEcranAccueil(expiration) {

    const nom = [candidature.personnel?.prenom, candidature.personnel?.nom].filter(Boolean).join(" ") || "";
    const matiere = (candidature.matieres && candidature.matieres[0]) || "Générale";
    const niveau = (candidature.niveaux && candidature.niveaux.join(", ")) || "-";

    carte.innerHTML = `
        <div class="accueil">
            <div class="logo">🧑‍🏫</div>
            <h1>TEST DE RECRUTEMENT EDUFORCI</h1>
            <div class="bienvenue">Bienvenue ${nom}</div>

            <div class="infos-test">
                <div><div class="val">${matiere}</div><div class="lbl">Matière</div></div>
                <div><div class="val">${niveau}</div><div class="lbl">Niveau</div></div>
                <div><div class="val">60 min</div><div class="lbl">Durée</div></div>
                <div><div class="val">${NB_QUESTIONS}</div><div class="lbl">Questions</div></div>
                <div><div class="val">${prochaineTentative}/${TENTATIVES_AUTORISEES}</div><div class="lbl">Tentative</div></div>
                ${expiration ? `<div><div class="val">${formaterDateExpiration(expiration)}</div><div class="lbl">Expire le</div></div>` : ""}
            </div>

            <div class="certif">
                <input type="checkbox" class="case-certif" id="certif1">
                <label for="certif1">Je certifie passer ce test sans assistance.</label>
            </div>
            <div class="certif">
                <input type="checkbox" class="case-certif" id="certif2">
                <label for="certif2">Je comprends que toute fraude entraîne l'annulation de ma candidature.</label>
            </div>
            <div class="certif">
                <input type="checkbox" class="case-certif" id="certif3">
                <label for="certif3">Je suis prêt(e).</label>
            </div>

            <button class="demarrer" id="btnDemarrer" disabled>▶ Commencer le test</button>
        </div>`;

    document.querySelectorAll(".case-certif").forEach((cb) => {
        cb.addEventListener("change", () => {
            const toutesCochees = [...document.querySelectorAll(".case-certif")].every(c => c.checked);
            document.getElementById("btnDemarrer").disabled = !toutesCochees;
        });
    });

    document.getElementById("btnDemarrer").addEventListener("click", async () => {
        await entrerPleinEcran();
        demarrerTest();
    });

}

// ==========================================================
// DÉMARRAGE DU TEST (création du document testsRecrutement)
// ==========================================================

async function demarrerTest() {

    window.showLoading("Préparation de votre test...");

    try {

        const matiere = (candidature.matieres && candidature.matieres[0]) || "Générale";

        const q = query(collection(db, "questionsRecrutement"), where("matiere", "==", matiere));
        const snap = await getDocs(q);

        if (snap.empty) {
            window.hideLoading();
            afficherEtat("⚠️", "Banque de questions indisponible", `Aucune question n'est encore disponible pour la matière « ${matiere} ». Merci de contacter l'équipe EDUFORCI.`);
            return;
        }

        const toutesLesQuestions = [];
        snap.forEach((d) => toutesLesQuestions.push({ id: d.id, ...d.data() }));

        const questionsChoisies = melanger(toutesLesQuestions).slice(0, NB_QUESTIONS).map((q) => ({
            id: q.id,
            question: q.question,
            choix: q.choix
            // volontairement : ni reponseCorrecte, ni explication ici.
            // Elles ne seront récupérées qu'à la finalisation du test (voir finaliserTest).
        }));

        const maintenant = new Date().toISOString();

        test = {
            candidat: { uid, nom: candidature.personnel?.nom || "", prenom: candidature.personnel?.prenom || "" },
            matiere,
            sessionId: genererSessionId(),
            questions: questionsChoisies,
            reponses: {},
            marquees: {},
            statut: "en_cours",
            debut: maintenant,
            fin: null,
            dureeSecondes: DUREE_SECONDES,
            tempsUtiliseSecondes: null,
            score: null,
            pourcentage: null,
            avertissements: 0,
            journalAntiTriche: [],
            tentativeNumero: prochaineTentative,
            questionActuelle: 1,
            actualisations: 0,
            deconnexions: 0,
            terminé: false
        };

        await setDoc(doc(db, "testsRecrutement", uid), test);

        // Trace dans l'historique de la candidature
        await updateDoc(doc(db, "candidaturesRecrutement", uid), {
            historique: arrayUnion({ date: maintenant, action: `Test démarré — session ${test.sessionId}` })
        });

        window.hideLoading();
        avertissements = 0;
        demarrerEcranTest();

    } catch (error) {
        window.hideLoading();
        window.notify("Erreur au démarrage du test : " + error.message, "erreur");
    }

}

// ==========================================================
// ÉCRAN DE TEST
// ==========================================================

function demarrerEcranTest() {

    indexActuel = Object.keys(test.reponses || {}).length
        ? test.questions.findIndex(q => !(q.id in test.reponses))
        : 0;
    if (indexActuel === -1) indexActuel = test.questions.length - 1;

    carte.innerHTML = `
        <div class="entete-test">
            <div class="logo">EDUFORCI</div>
            <div class="chrono" id="chrono">--:--</div>
        </div>
        <div class="progression-zone">
            <div class="progression-txt"><span id="labelQuestion">Question 1 / ${test.questions.length}</span></div>
            <div class="barre-progression"><div class="barre-progression-remplie" id="barreProgression" style="width:0%;"></div></div>
        </div>

        <div class="panneau-questions">
            <div class="panneau-titre">Navigation rapide</div>
            <div class="grille-questions" id="grilleQuestions"></div>
            <div class="legende-questions">
                <span><span class="legende-puce" style="background:#e6f7ec;border:2px solid #28a745;"></span>Répondue</span>
                <span><span class="legende-puce" style="background:#eaf1ff;border:2px solid #0B63F6;"></span>Actuelle</span>
                <span><span class="legende-puce" style="background:white;border:2px solid #eee;"></span>À faire</span>
                <span>🚩 Marquée</span>
            </div>
        </div>

        <div class="zone-question" id="zoneQuestion"></div>
        <div class="nav-test">
            <button class="btn-precedent" id="btnPrecedent">◀ Précédent</button>
            <button class="btn-suivant" id="btnSuivant">Suivant ▶</button>
        </div>
        <div class="nav-test-secondaire">
            <button class="btn-marquer" id="btnMarquer">🚩 Marquer pour revenir</button>
            <button class="btn-terminer" id="btnTerminer">✅ Terminer le test</button>
        </div>
    `;

    document.getElementById("btnPrecedent").addEventListener("click", () => { if (indexActuel > 0) { indexActuel--; afficherQuestion(); } });
    document.getElementById("btnSuivant").addEventListener("click", () => { if (indexActuel < test.questions.length - 1) { indexActuel++; afficherQuestion(); } });
    document.getElementById("btnMarquer").addEventListener("click", basculerMarquage);
    document.getElementById("btnTerminer").addEventListener("click", () => {
        const nbReponses = Object.keys(test.reponses).length;
        const nbTotal = test.questions.length;
        const confirmation = nbReponses < nbTotal
            ? confirm(`Il vous reste ${nbTotal - nbReponses} question(s) sans réponse. Voulez-vous vraiment terminer le test maintenant ? Cette action est définitive.`)
            : confirm("Voulez-vous vraiment terminer et envoyer votre test ? Cette action est définitive.");
        if (confirmation) finaliserTest("Test terminé par le candidat");
    });

    afficherQuestion();
    demarrerChrono();
    surveillerAntiTriche();
    window.addEventListener("beforeunload", (e) => { if (test && !test.terminé) { e.preventDefault(); e.returnValue = ""; } });

}

function construireGrilleQuestions() {
    return test.questions.map((q, i) => {
        let classe = "";
        if (i === indexActuel) classe = "chip-actuel";
        else if (test.reponses[q.id] !== undefined) classe = "chip-repondue";
        if (test.marquees && test.marquees[q.id]) classe += " chip-marquee";
        return `<div class="chip-question ${classe}" data-index="${i}">${i + 1}</div>`;
    }).join("");
}

async function basculerMarquage() {
    const q = test.questions[indexActuel];
    if (!test.marquees) test.marquees = {};
    const nouvelEtat = !test.marquees[q.id];
    test.marquees[q.id] = nouvelEtat;
    afficherQuestion();
    try {
        await updateDoc(doc(db, "testsRecrutement", uid), { [`marquees.${q.id}`]: nouvelEtat });
    } catch (error) {
        console.warn("Échec de la sauvegarde du marquage :", error.message);
    }
}

function afficherQuestion() {

    const q = test.questions[indexActuel];
    const reponseActuelle = test.reponses[q.id];

    document.getElementById("labelQuestion").textContent = `Question ${indexActuel + 1} / ${test.questions.length}`;
    document.getElementById("barreProgression").style.width = `${((indexActuel + 1) / test.questions.length) * 100}%`;
    document.getElementById("grilleQuestions").innerHTML = construireGrilleQuestions();
    document.querySelectorAll(".chip-question").forEach((chip) => {
        chip.addEventListener("click", () => { indexActuel = Number(chip.dataset.index); afficherQuestion(); });
    });

    updateDoc(doc(db, "testsRecrutement", uid), { questionActuelle: indexActuel + 1 }).catch(() => {});

    const zone = document.getElementById("zoneQuestion");
    zone.innerHTML = `
        <h2>${q.question}</h2>
        ${q.choix.map((c, i) => `
            <label class="choix ${reponseActuelle === i ? "selectionne" : ""}" data-index="${i}">
                <input type="radio" name="reponse" value="${i}" ${reponseActuelle === i ? "checked" : ""}>
                ${c}
            </label>
        `).join("")}
    `;

    zone.querySelectorAll(".choix").forEach((label) => {
        label.addEventListener("click", () => enregistrerReponse(q.id, Number(label.dataset.index)));
    });

    document.getElementById("btnPrecedent").disabled = indexActuel === 0;
    document.getElementById("btnSuivant").disabled = indexActuel === test.questions.length - 1;

    const estMarquee = !!(test.marquees && test.marquees[q.id]);
    const btnMarquer = document.getElementById("btnMarquer");
    btnMarquer.textContent = estMarquee ? "🚩 Retirer le marquage" : "🚩 Marquer pour revenir";
    btnMarquer.classList.toggle("actif", estMarquee);

}

async function enregistrerReponse(questionId, choixIndex) {

    test.reponses[questionId] = choixIndex;
    afficherQuestion();

    try {
        await updateDoc(doc(db, "testsRecrutement", uid), { [`reponses.${questionId}`]: choixIndex });
    } catch (error) {
        console.warn("Échec de la sauvegarde automatique :", error.message);
    }

}

// ==========================================================
// CHRONOMÈTRE
// ==========================================================

function demarrerChrono() {

    if (intervalChrono) clearInterval(intervalChrono);

    intervalChrono = setInterval(() => {

        const debutMs = new Date(test.debut).getTime();
        const ecouleSec = Math.floor((Date.now() - debutMs) / 1000);
        const restantSec = test.dureeSecondes - ecouleSec;

        if (restantSec <= 0) {
            clearInterval(intervalChrono);
            finaliserTest("Temps écoulé", "temps");
            return;
        }

        const min = Math.floor(restantSec / 60).toString().padStart(2, "0");
        const sec = (restantSec % 60).toString().padStart(2, "0");
        const chronoEl = document.getElementById("chrono");
        if (chronoEl) {
            chronoEl.textContent = `⏳ ${min}:${sec}`;
            chronoEl.classList.toggle("urgent", restantSec < 300);
        }

    }, 1000);

}

// ==========================================================
// ANTI-TRICHE (changements d'onglet + sortie du plein écran)
// avertissements progressifs : 1, 2, puis fin automatique au 3e
// ==========================================================

function surveillerAntiTriche() {

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && test && !test.terminé && !finalisationEnCours) {
            declencherAvertissement("changement_onglet", "Vous avez changé d'onglet ou quitté la fenêtre.\nVeuillez revenir immédiatement.");
        }
    });

    if (pleinEcranDisponible()) {
        document.addEventListener("fullscreenchange", () => {
            if (!document.fullscreenElement && test && !test.terminé && !finalisationEnCours && !enPause) {
                declencherAvertissement("sortie_plein_ecran", "Vous avez quitté le mode plein écran.");
            }
        });
    }

    window.addEventListener("offline", () => {
        if (test && !test.terminé) {
            updateDoc(doc(db, "testsRecrutement", uid), { deconnexions: (test.deconnexions || 0) + 1 }).catch(() => {});
            if (test) test.deconnexions = (test.deconnexions || 0) + 1;
        }
    });

}

const LIBELLES_ORDRE = { 1: "Premier avertissement.", 2: "Deuxième avertissement." };

async function declencherAvertissement(type, message) {

    if (!test || test.terminé || finalisationEnCours || enPause) return;

    avertissements++;
    enPause = true;

    const entree = { date: new Date().toISOString(), type, message };

    try {
        await updateDoc(doc(db, "testsRecrutement", uid), {
            avertissements,
            journalAntiTriche: arrayUnion(entree)
        });
    } catch (error) {
        console.warn("Erreur de suivi anti-triche :", error.message);
    }

    if (avertissements >= MAX_AVERTISSEMENTS) {
        finaliserTest("Nombre d'avertissements dépassé", "fraude");
        return;
    }

    document.getElementById("avertissementTitre").textContent = LIBELLES_ORDRE[avertissements] || "Avertissement.";
    document.getElementById("avertissementTexte").textContent = message;
    document.getElementById("avertissementCompteur").textContent = `Avertissement ${avertissements}/${MAX_AVERTISSEMENTS}`;
    document.getElementById("overlayAvertissement").classList.add("visible");

}

document.getElementById("btnRevenirTest").addEventListener("click", async () => {
    document.getElementById("overlayAvertissement").classList.remove("visible");
    enPause = false;
    if (pleinEcranDisponible() && !document.fullscreenElement && test && !test.terminé) {
        await entrerPleinEcran();
    }
});

// ==========================================================
// FINALISATION / CORRECTION AUTOMATIQUE
// ==========================================================

async function finaliserTest(motif, type = "normal") {

    if (finalisationEnCours || (test && test.terminé)) return;
    finalisationEnCours = true;

    if (intervalChrono) clearInterval(intervalChrono);
    window.removeEventListener("beforeunload", () => {});
    document.getElementById("overlayAvertissement").classList.remove("visible");
    sortirPleinEcran();

    window.showLoading("Correction en cours...");

    try {

        // Les bonnes réponses ne sont récupérées qu'ici, à la toute fin du test,
        // jamais envoyées au navigateur pendant que le candidat répond.
        const correctionsSnap = await Promise.all(
            test.questions.map((q) => getDoc(doc(db, "questionsRecrutement", q.id)))
        );

        let bonnesReponses = 0;
        test.questions.forEach((q, i) => {
            const correction = correctionsSnap[i].exists() ? correctionsSnap[i].data() : null;
            if (correction && test.reponses[q.id] === correction.reponseCorrecte) bonnesReponses++;
        });

        const total = test.questions.length;
        const pourcentage = total ? Math.round((bonnesReponses / total) * 100) : 0;
        const scoreSur20 = total ? Math.round((bonnesReponses / total) * 20 * 10) / 10 : 0;

        const debutMs = new Date(test.debut).getTime();
        const tempsUtiliseSecondes = Math.min(test.dureeSecondes, Math.floor((Date.now() - debutMs) / 1000));
        const maintenant = new Date().toISOString();

        await updateDoc(doc(db, "testsRecrutement", uid), {
            statut: "termine",
            terminé: true,
            fin: maintenant,
            motifFin: motif,
            typeFin: type,
            tempsUtiliseSecondes,
            score: type === "fraude" ? 0 : scoreSur20,
            pourcentage: type === "fraude" ? 0 : pourcentage,
            avertissements
        });

        await updateDoc(doc(db, "candidaturesRecrutement", uid), {
            historique: arrayUnion({ date: maintenant, action: `Test terminé (${motif}) — session ${test.sessionId}` })
        });

        window.hideLoading();

        if (type === "fraude") {
            carte.innerHTML = `
                <div class="etat">
                    <div class="emoji">🚫</div>
                    <h2>Le test est terminé.</h2>
                    <p>Motif : ${motif}.<br>Votre candidature sera examinée par l'équipe EDUFORCI.</p>
                    <a href="dashboard-enseignant.html">Retour au tableau de bord</a>
                </div>`;
        } else {
            carte.innerHTML = `
                <div class="etat">
                    <div class="emoji">✔️</div>
                    <h2>Merci.</h2>
                    <p>Vos réponses sont enregistrées.<br>Votre dossier est en cours d'évaluation.<br>Vous serez notifié(e).</p>
                    <a href="dashboard-enseignant.html">Retour au tableau de bord</a>
                </div>`;
        }

    } catch (error) {
        window.hideLoading();
        window.notify("Erreur lors de la finalisation : " + error.message, "erreur");
        finalisationEnCours = false;
    }

}

</script>
