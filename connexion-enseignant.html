<!DOCTYPE html>
<html lang="fr">
<head>
<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion Enseignant | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.form-box{

background:#fff;

width:400px;

padding:40px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.logo{

display:block;

margin:auto;

height:70px;

margin-bottom:20px;

}

h2{

text-align:center;

color:#0B63F6;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

.champ-oeil{position:relative;margin-bottom:15px;}
.champ-oeil input{margin-bottom:0;padding-right:46px;}
.champ-oeil .toggle-oeil{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;width:auto;line-height:1;color:#8a94a6;display:flex;align-items:center;justify-content:center;opacity:.75;}
.champ-oeil .toggle-oeil:hover{opacity:1;color:#0B63F6;}

button{

width:100%;

padding:15px;

background:#0B63F6;

color:#fff;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

display:block;

margin:8px 0;

text-decoration:none;

color:#0B63F6;

}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>


<form class="form-box" id="formConnexion">

<img decoding="async" src="logo.png" class="logo" alt="EDUFORCI">

<h2>Connexion Enseignant</h2>

<input type="email" id="email" placeholder="Adresse e-mail" required>

<div class="champ-oeil">
<input type="password" id="password" placeholder="Mot de passe" required>
<button type="button" class="toggle-oeil" data-cible="password" aria-label="Afficher le mot de passe">
<svg class="icone-oeil" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>

<button>Se connecter</button>

<div class="links">

<a href="#" id="forgotPassword">Mot de passe oublié ?</a>

<a href="inscription-enseignant.html">Créer un compte Enseignant</a>

</div>

</form>
<script type="module">

import {
  connexionEnseignant,
  motDePasseOublie
} from "./js/auth.js?v=2";

const form = document.getElementById("formConnexion");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    await connexionEnseignant(email, password);

});

    document.getElementById("forgotPassword").addEventListener("click", async (e) => {

    e.preventDefault();

    const email = document.getElementById("email").value.trim();

    if (!email) {
        alert("Veuillez saisir votre adresse e-mail.");
        return;
    }

    await motDePasseOublie(email);

});

const boutonOeil = document.querySelector(".toggle-oeil[data-cible='password']");
if (boutonOeil) {
    const champPassword = document.getElementById("password");
    const iconeVisible = `<svg class="icone-oeil" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const iconeCachee = `<svg class="icone-oeil" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 5.39-1.61"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    boutonOeil.addEventListener("click", () => {
        const cache = champPassword.type === "password";
        champPassword.type = cache ? "text" : "password";
        boutonOeil.innerHTML = cache ? iconeCachee : iconeVisible;
        boutonOeil.setAttribute("aria-label", cache ? "Masquer le mot de passe" : "Afficher le mot de passe");
    });
}
</script>
</body>

</html>
