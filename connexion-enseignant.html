<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion Enseignant | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(rgba(8,34,88,.85),rgba(8,34,88,.85)),url("images/hero.jpg");

background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.form-box{

background:#fff;

width:400px;

padding:40px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.logo{

display:block;

margin:auto;

height:70px;

margin-bottom:20px;

}

h2{

text-align:center;

color:#0B63F6;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#0B63F6;

color:#fff;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

display:block;

margin:8px 0;

text-decoration:none;

color:#0B63F6;

}

</style>

</head>

<body>

<div class="form-box">

<img src="images/logo.png" class="logo" alt="EDUFORCI">

<h2>Connexion Enseignant</h2>

<input type="text" placeholder="E-mail ou téléphone">

<input type="password" placeholder="Mot de passe">

<button>Se connecter</button>

<div class="links">

<a href="#">Mot de passe oublié ?</a>

<a href="inscription-enseignant.html">Créer un compte Enseignant</a>

</div>

</div>

</html>
