<!DOCTYPE html>
<html lang="fr">

<head>
<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil Enseignant | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;

}

.header{

background:#153A73;

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

.header img{

height:60px;

}

.container{

max-width:1200px;

margin:40px auto;

padding:20px;

display:grid;

grid-template-columns:320px 1fr;

gap:30px;

}

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.avatar-circle{

width:150px;

height:150px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

margin:auto;

margin-bottom:20px;

border:5px solid #0B63F6;

background:#eaf1ff;

color:#0B63F6;

font-size:44px;

font-weight:700;

overflow:hidden;

}

.avatar-circle img{

width:100%;

height:100%;

object-fit:cover;

}

h2{

text-align:center;

color:#153A73;

margin-bottom:10px;

}

.badge{

background:#28a745;

color:white;

padding:8px 15px;

border-radius:30px;

display:inline-block;

margin:auto;

}

.badge.attente{

background:#e08b00;

}

.info p{

margin:12px 0;

font-size:16px;

}

button{

width:100%;

padding:15px;

margin-top:20px;

background:#0B63F6;

color:white;

border:none;

border-radius:10px;

font-size:17px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.dispo-item{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px solid #eee;

font-size:15px;

}

.dispo-item:last-child{

border-bottom:none;

}

.dispo-oui{color:#28a745;font-weight:600;}
.dispo-non{color:#bbb;}

.avis-item{

padding:15px 0;

border-bottom:1px solid #eee;

}

.avis-item:last-child{

border-bottom:none;

}

.avis-item .haut{

display:flex;

justify-content:space-between;

margin-bottom:6px;

font-weight:600;

color:#153A73;

}

.empty{

text-align:center;

padding:60px 20px;

color:#999;

}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>


<div class="header">

<img src="logo.png">

</div>

<div class="container" id="conteneurProfil">

<div class="card" style="text-align:center;grid-column:1/-1;">
<p class="empty">Chargement du profil...</p>
</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const teacherDocId = params.get("id");

const joursOrdre = ["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];
const joursLabels = {lundi:"Lundi",mardi:"Mardi",mercredi:"Mercredi",jeudi:"Jeudi",vendredi:"Vendredi",samedi:"Samedi",dimanche:"Dimanche"};

let ENSEIGNANT_ID = null;
let ENSEIGNANT_NOM = null;
let enseignant = null;
let parentConnecte = null;

function formaterTarif(tarif, tarifType) {
    const nombre = Number(tarif);
    if (!nombre || nombre <= 0) return "Tarif à discuter";
    return nombre.toLocaleString("fr-FR") + " FCFA / " + (tarifType === "mois" ? "mois" : "heure");
}

function construireDisponibiliteHTML() {

    const dispo = enseignant.disponibilites || {};

    return joursOrdre.map((cle) => {
        const info = dispo[cle];
        if (info && info.actif) {
            return `<div class="dispo-item"><span>${joursLabels[cle]}</span><span class="dispo-oui">✔ ${info.horaire || "Disponible"}</span></div>`;
        }
        return `<div class="dispo-item"><span>${joursLabels[cle]}</span><span class="dispo-non">Indisponible</span></div>`;
    }).join("");

}

async function chargerAvisEtNote() {

    const zoneAvis = document.getElementById("zoneAvis");
    const zoneNote = document.getElementById("zoneNote");

    try {

        const q = query(collection(db, "avis"), where("enseignantId", "==", ENSEIGNANT_ID));
        const snap = await getDocs(q);

        if (snap.empty) {
            zoneNote.textContent = "Pas encore noté";
            zoneAvis.innerHTML = `<p class="empty" style="padding:20px;">Aucun avis pour le moment. Soyez le premier à en laisser un !</p>`;
            return;
        }

        let total = 0;
        let html = "";

        snap.forEach((docSnap) => {
            const d = docSnap.data();
            total += Number(d.note) || 0;
            html += `
                <div class="avis-item">
                    <div class="haut"><span>${d.parentNom || "Parent"}</span><span>${"⭐".repeat(Number(d.note) || 0)}</span></div>
                    <p style="color:#555;">${d.commentaire || ""}</p>
                </div>
            `;
        });

        const moyenne = (total / snap.size).toFixed(1);
        zoneNote.textContent = moyenne + " / 5 (" + snap.size + " avis)";
        zoneAvis.innerHTML = html;

    } catch (error) {
        zoneAvis.innerHTML = `<p class="empty">Erreur : ${error.message}</p>`;
    }

}

function favoriRef(uid) {
    return doc(db, "favoris", uid + "_" + ENSEIGNANT_ID);
}

async function actualiserBoutonFavori() {
    if (!parentConnecte) return;
    const snap = await getDoc(favoriRef(parentConnecte.uid));
    const btn = document.getElementById("btnFavori");
    if (!btn) return;
    if (snap.exists()) {
        btn.innerHTML = "❤️ Retirer des favoris";
        btn.style.background = "#0B63F6";
        btn.style.color = "white";
    } else {
        btn.innerHTML = "🤍 Ajouter aux favoris";
        btn.style.background = "white";
        btn.style.color = "#0B63F6";
    }
}

function construireLienWhatsapp(prof, docId) {
    const NUMERO_WHATSAPP = "2250747327309";
    const texte = `Bonjour, je suis intéressé(e) par les cours de ${prof.nom || "cet enseignant"} (${prof.matiere || "-"}), basé à ${prof.ville || "-"} (Réf : ${prof.identifiant || docId}). Tarif indiqué : ${formaterTarif(prof.tarif, prof.tarifType)}. Pouvez-vous m'aider à réserver ?`;
    return `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(texte)}`;
}

function attacherEvenements() {

    document.getElementById("btnFavori").addEventListener("click", async () => {

        if (!parentConnecte) {
            alert("Veuillez vous connecter pour ajouter un favori.");
            window.location.href = "connexion-parent.html";
            return;
        }

        try {

            const ref = favoriRef(parentConnecte.uid);
            const snap = await getDoc(ref);

            if (snap.exists()) {
                await deleteDoc(ref);
            } else {
                await setDoc(ref, {
                    parentId: parentConnecte.uid,
                    enseignantId: ENSEIGNANT_ID,
                    enseignantNom: ENSEIGNANT_NOM,
                    matiere: enseignant.matiere || "-",
                    dateAjout: new Date().toISOString()
                });
            }

            actualiserBoutonFavori();

        } catch (error) {
            alert(error.message);
        }

    });

    document.getElementById("btnEnvoyerAvis").addEventListener("click", async () => {

        if (!parentConnecte) {
            alert("Veuillez vous connecter pour publier un avis.");
            window.location.href = "connexion-parent.html";
            return;
        }

        const note = document.getElementById("noteAvis").value;
        const commentaire = document.getElementById("commentaireAvis").value.trim();

        if (!commentaire) {
            alert("Merci d'écrire un commentaire avant de publier.");
            return;
        }

        try {

            const parentSnap = await getDoc(doc(db, "parents", parentConnecte.uid));
            const parentNom = parentSnap.exists() ? parentSnap.data().nom : "Parent";

            await addDoc(collection(db, "avis"), {
                parentId: parentConnecte.uid,
                parentNom: parentNom,
                enseignantNom: ENSEIGNANT_NOM,
                enseignantId: ENSEIGNANT_ID,
                note: Number(note),
                commentaire: commentaire,
                dateAvis: new Date().toISOString()
            });

            alert("Votre avis a été publié avec succès !");
            document.getElementById("commentaireAvis").value = "";
            chargerAvisEtNote();

        } catch (error) {
            alert(error.message);
        }

    });

}

async function chargerProfil() {

    const conteneur = document.getElementById("conteneurProfil");

    if (!teacherDocId) {
        conteneur.innerHTML = `<div class="card" style="grid-column:1/-1;"><p class="empty">Aucun enseignant sélectionné.<br><a href="enseignants.html">Voir tous les enseignants →</a></p></div>`;
        return;
    }

    const snap = await getDoc(doc(db, "enseignants", teacherDocId));

    if (!snap.exists()) {
        conteneur.innerHTML = `<div class="card" style="grid-column:1/-1;"><p class="empty">Cet enseignant est introuvable.<br><a href="enseignants.html">Voir tous les enseignants →</a></p></div>`;
        return;
    }

    enseignant = snap.data();

    if (enseignant.verification !== true) {
        conteneur.innerHTML = `<div class="card" style="grid-column:1/-1;"><p class="empty">Ce profil est en attente de validation par l'équipe EDUFORCI et n'est pas encore visible publiquement.<br><a href="enseignants.html">Voir tous les enseignants →</a></p></div>`;
        return;
    }

    ENSEIGNANT_ID = enseignant.identifiant;
    ENSEIGNANT_NOM = enseignant.nom;

    const initiales = (enseignant.nom || "??").split(" ").map(m => m[0]).join("").substring(0, 2).toUpperCase();

    conteneur.innerHTML = `

    <div class="card">

    <div class="avatar-circle">${enseignant.photo ? `<img src="${enseignant.photo}" alt="${enseignant.nom || 'Enseignant'}">` : initiales}</div>

    <h2>${enseignant.nom || "Enseignant"}</h2>

    <div style="text-align:center;margin-bottom:20px;">
    <span class="badge ${enseignant.verification ? "" : "attente"}">${enseignant.verification ? "✔ Profil vérifié" : "⏳ Vérification en attente"}</span>
    </div>

    <div class="info">

    <p><strong>📚 Matière :</strong> ${enseignant.matiere || "-"}</p>

    <p><strong>🎓 Diplôme :</strong> ${enseignant.diplome || "-"}</p>

    <p><strong>💼 Expérience :</strong> ${enseignant.experience || "0"} an(s)</p>

    <p><strong>📍 Ville :</strong> ${enseignant.ville || "-"}</p>

    <p><strong>⭐ Note :</strong> <span id="zoneNote">...</span></p>

    <p><strong>💰 Tarif :</strong> ${formaterTarif(enseignant.tarif, enseignant.tarifType)}</p>

    <p><strong>📅 Statut :</strong> <span style="color:${enseignant.disponible !== false ? "#28a745" : "#d93025"};font-weight:600;">
${enseignant.disponible !== false
    ? "🟢 Disponible"
    : "🔴 Indisponible"}
</span>

    </div>

    <a id="btnWhatsapp"
   href="#"
   target="_blank"
   style="display:block;text-decoration:none;">
    <button type="button">
        📲 Réserver via WhatsApp
    </button>
</a>

    <button id="btnFavori" style="background:white;color:#0B63F6;border:2px solid #0B63F6;margin-top:12px;">🤍 Ajouter aux favoris</button>

    </div>

    <div class="card">

    <h2 style="text-align:left;">Présentation</h2>

    <p style="margin-top:20px;line-height:1.8;color:#555;">
    ${enseignant.presentation || "Ce professeur n'a pas encore ajouté de présentation."}
    </p>

    <br>

    <h2 style="text-align:left;">📅 Disponibilités</h2>

    <div style="margin-top:15px;">
    ${construireDisponibiliteHTML()}
    </div>

    <br>

    <h2 style="text-align:left;">Avis des parents</h2>

    <div id="zoneAvis" style="margin-top:15px;">
    <p class="empty" style="padding:20px;">Chargement des avis...</p>
    </div>

    <div style="margin-top:25px;padding:20px;background:#f8f9fc;border-radius:15px;">

    <h3 style="color:#153A73;margin-bottom:15px;">Laisser un avis</h3>

    <label style="display:block;margin-bottom:8px;font-weight:600;color:#153A73;">Note</label>

    <select id="noteAvis" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;">
    <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
    <option value="4">⭐⭐⭐⭐ (4/5)</option>
    <option value="3">⭐⭐⭐ (3/5)</option>
    <option value="2">⭐⭐ (2/5)</option>
    <option value="1">⭐ (1/5)</option>
    </select>

    <label style="display:block;margin-bottom:8px;font-weight:600;color:#153A73;">Commentaire</label>

    <textarea id="commentaireAvis" placeholder="Partagez votre expérience..." style="width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;font-size:15px;min-height:90px;resize:vertical;"></textarea>

    <button id="btnEnvoyerAvis" style="margin-top:12px;">Publier mon avis</button>

    </div>

    </div>

    `;

    attacherEvenements();
    chargerAvisEtNote();
    document.getElementById("btnWhatsapp").href =
    construireLienWhatsapp(enseignant, teacherDocId);
    onAuthStateChanged(auth, (user) => {
        if (user) {
            parentConnecte = user;
            actualiserBoutonFavori();
        }
    });

}

chargerProfil();

</script>

</body>

</html>
