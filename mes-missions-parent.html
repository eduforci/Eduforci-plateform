<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;display:flex;}

.sidebar{width:260px;height:100vh;background:#153A73;color:white;padding:30px 20px;position:fixed;top:0;left:0;overflow-y:auto;}
.sidebar img{height:65px;display:block;margin:auto;margin-bottom:25px;}
.sidebar a{display:block;padding:14px;margin-bottom:10px;border-radius:10px;text-decoration:none;color:white;transition:.3s;}
.sidebar a:hover{background:#0B63F6;}
.sidebar a.active{background:#0B63F6;}

.main{margin-left:260px;padding:35px;width:100%;max-width:800px;}

h1{color:#153A73;margin-bottom:20px;}

.mission-card{background:white;border-radius:20px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px;}
.mission-entete{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.mission-entete h3{color:#153A73;}

.badge-statut{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:600;white-space:nowrap;}
.statut-en_attente{background:#fff4e0;color:#e08b00;}
.statut-proposition_envoyee{background:#eaf1ff;color:#0B63F6;}
.statut-enseignant_disponible{background:#eafaf0;color:#1f8a3d;}
.statut-enseignant_retenu{background:#e6f7ec;color:#28a745;}
.statut-terminee{background:#eee;color:#666;}

.details-grille{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;font-size:14px;color:#333;}
.details-grille div strong{display:block;color:#153A73;font-size:12.5px;margin-bottom:2px;}

.retenu-info{margin-top:14px;background:#e6f7ec;color:#1f7a35;font-weight:600;padding:12px 15px;border-radius:10px;font-size:14px;}

.empty{background:white;padding:50px 20px;border-radius:20px;text-align:center;color:#999;box-shadow:0 10px 25px rgba(0,0,0,.08);}
.empty a{color:#0B63F6;font-weight:600;text-decoration:none;}


.menu-toggle{display:none;position:fixed;top:20px;left:20px;z-index:100000;background:#153A73;color:#fff;border:none;width:48px;height:48px;border-radius:12px;font-size:20px;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.25);cursor:pointer;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9998;}
@media (max-width:900px){
.menu-toggle{display:flex;}
.sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:9999;}
.sidebar.ouvert{transform:translateX(0);}
.sidebar-overlay.ouvert{display:block;}
.main{margin-left:0!important;padding:20px!important;padding-top:85px!important;max-width:100%!important;}
}
</style>

</head>

<body>

<button class="menu-toggle" id="menuToggleEduforci" aria-label="Menu">☰</button>

<div class="sidebar">

<div class="main">

<h1>📋 Mes demandes de professeur</h1>

<div id="listeMissions"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { echapperHTML } from "./js/securite.js";

const LIBELLES_STATUT = {
    en_attente: "⏳ En attente",
    proposition_envoyee: "📨 Proposition envoyée",
    enseignant_disponible: "🟢 Enseignant disponible",
    enseignant_retenu: "✅ Enseignant retenu",
    terminee: "🏁 Terminée"
};

function formaterDate(iso) {
    if (!iso) return "-";
    try { return new Date(iso).toLocaleDateString("fr-FR"); } catch { return iso; }
}

async function chargerMissions(uid) {

    const conteneur = document.getElementById("listeMissions");

    try {

        const q = query(collection(db, "missions"), where("demandeurId", "==", uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            conteneur.innerHTML = `<div class="empty">Vous n'avez encore fait aucune demande.<br><a href="demande-mission-parent.html">Faire une demande de professeur →</a></div>`;
            return;
        }

        conteneur.innerHTML = "";

        const missions = [];
        snap.forEach((docSnap) => missions.push(docSnap.data()));
        missions.sort((a, b) => new Date(b.dateCreation || 0) - new Date(a.dateCreation || 0));

        missions.forEach((m) => {

            const carte = document.createElement("div");
            carte.className = "mission-card";

            carte.innerHTML = `
                <div class="mission-entete">
                    <h3>${echapperHTML(m.matiere || "-")} — ${echapperHTML(m.niveau || "-")}</h3>
                    <span class="badge-statut statut-${m.statut}">${LIBELLES_STATUT[m.statut] || m.statut}</span>
                </div>
                <div class="details-grille">
                    <div><strong>Commune</strong>${echapperHTML(m.commune || "-")}</div>
                    <div><strong>Heures</strong>${echapperHTML(m.nombreHeures || "-")}</div>
                    <div><strong>Budget</strong>${echapperHTML(m.remuneration || "À discuter")}</div>
                    <div><strong>Date souhaitée</strong>${formaterDate(m.dateSouhaitee)}</div>
                </div>
                ${m.enseignantRetenuId ? `<div class="retenu-info">✅ Un enseignant a été retenu pour cette demande. EDUFORCI va vous mettre en relation.</div>` : ""}
            `;

            conteneur.appendChild(carte);

        });

    } catch (error) {
        conteneur.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "connexion-parent.html";
        return;
    }

    chargerMissions(user.uid);

});

</script>


<script>
(function(){
  const btn = document.getElementById("menuToggleEduforci");
  const overlay = document.getElementById("sidebarOverlayEduforci");
  const sidebar = document.querySelector(".sidebar");
  if(!btn||!sidebar) return;
  function ouvrir(){ sidebar.classList.add("ouvert"); overlay.classList.add("ouvert"); }
  function fermer(){ sidebar.classList.remove("ouvert"); overlay.classList.remove("ouvert"); }
  btn.addEventListener("click", function(){ sidebar.classList.contains("ouvert") ? fermer() : ouvrir(); });
  overlay.addEventListener("click", fermer);
  sidebar.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", fermer); });
})();
</script>
</body>
