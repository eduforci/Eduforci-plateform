<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="page-header">
    <h1>Contactez-nous</h1>
    <p>Notre équipe est à votre écoute pour répondre à toutes vos questions.</p>
</header>

<section class="contact-section">

    <div class="contact-card">
        <i class="fas fa-phone"></i>
        <h3>Téléphone</h3>
        <p>+225 XX XX XX XX XX</p>
    </div>

    <div class="contact-card">
        <i class="fab fa-whatsapp"></i>
        <h3>WhatsApp</h3>
        <p>+225 07 47 32 73 09</p>
    </div>

    <div class="contact-card">
        <i class="fas fa-envelope"></i>
        <h3>Email</h3>
        <p>contact@eduforci.com</p>
    </div>

    <div class="contact-card">
        <i class="fas fa-map-marker-alt"></i>
        <h3>Adresse</h3>
        <p>Côte d'Ivoire</p>
    </div>

</section>

<section class="contact-form">

<h2>Envoyez-nous un message</h2>

<form>

<input type="text" placeholder="Votre nom" required>

<input type="email" placeholder="Votre e-mail" required>

<input type="tel" placeholder="Votre téléphone">

<textarea placeholder="Votre message" rows="6" required></textarea>

<button type="submit">Envoyer le message</button>

</form>

</section>

</body>

</html>
