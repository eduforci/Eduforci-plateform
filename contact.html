<!DOCTYPE html>
<html lang="fr">

<head>
<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>

<header class="page-header">
    <h1>Contactez-nous</h1>
    <p>Notre équipe est à votre écoute pour répondre à toutes vos questions.</p>
</header>

<section class="contact-section">

    <a href="tel:+2250507938547" style="text-decoration:none;color:inherit;">
    <div class="contact-card">
        <i class="fas fa-phone"></i>
        <h3>Téléphone</h3>
        <p>+225 05 07 93 85 47</p>
    </div>
    </a>

    <a href="https://wa.me/2250507938547" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
    <div class="contact-card">
        <i class="fab fa-whatsapp"></i>
        <h3>WhatsApp</h3>
        <p>+225 05 07 93 85 47</p>
    </div>
    </a>

    <a href="mailto:eduforci.formation@gmail.com" style="text-decoration:none;color:inherit;">
    <div class="contact-card">
        <i class="fas fa-envelope"></i>
        <h3>Email</h3>
        <p>eduforci.formation@gmail.com</p>
    </div>
    </a>

    <div class="contact-card">
        <i class="fas fa-map-marker-alt"></i>
        <h3>Adresse</h3>
        <p>Côte d'Ivoire</p>
    </div>

</section>

<section class="contact-form">

<h2>Envoyez-nous un message</h2>

<form id="formContact">

<input type="text" id="contactNom" placeholder="Votre nom" required>

<input type="email" id="contactEmail" placeholder="Votre e-mail" required>

<input type="tel" id="contactTelephone" placeholder="Votre téléphone">

<textarea id="contactMessage" placeholder="Votre message" rows="6" required></textarea>

<button type="submit">Envoyer le message</button>

</form>

</section>

<script>

document.getElementById("formContact").addEventListener("submit", function(e) {

    e.preventDefault();

    const nom = document.getElementById("contactNom").value.trim();
    const email = document.getElementById("contactEmail").value.trim();
    const telephone = document.getElementById("contactTelephone").value.trim();
    const message = document.getElementById("contactMessage").value.trim();

    if (!nom || !email || !message) {
        alert("Merci de remplir au moins votre nom, votre e-mail et votre message.");
        return;
    }

    const texte = `Bonjour, je vous contacte depuis le site EDUFORCI.\n\nNom : ${nom}\nEmail : ${email}\nTéléphone : ${telephone || "-"}\n\nMessage : ${message}`;

    window.open("https://wa.me/2250507938547?text=" + encodeURIComponent(texte), "_blank");

    document.getElementById("formContact").reset();

});

</script>

</body>

</html>
