<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recherche de professeurs | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
}

header{

background:#153A73;

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

header img{

height:60px;

}

.container{

max-width:1200px;

margin:40px auto;

padding:20px;

}

.search-box{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}

select,
button{

padding:15px;

border-radius:10px;

font-size:16px;

}

select{

border:1px solid #ddd;

}

button{

background:#0B63F6;

color:white;

border:none;

cursor:pointer;

font-weight:600;

}

button:hover{

background:#084ec7;

}

</style>

</head>

<body>
<a href="index.html" onclick="if(document.referrer && document.referrer.indexOf(window.location.host) !== -1 && window.history.length>1){history.back();return false;}" title="Retour" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Retour</a>


<header>

<img src="logo.png" alt="EDUFORCI">

</header>

<div class="container">
<h1 style="margin-bottom:25px;color:#153A73;">
🔍 Rechercher un professeur
</h1>

<div class="search-box">

<select id="matiere">
<option value="">Toutes les matières</option>
<option>Mathématiques</option>
<option>Anglais</option>
<option>Français</option>
<option>Physique-Chimie</option>
<option>SVT</option>
<option>Histoire-Géographie</option>
</select>

<select id="niveau">
<option value="">Tous les niveaux</option>
<option>Primaire</option>
<option>Collège</option>
<option>Lycée</option>
<option>Université</option>
</select>

  <select id="ville">
<option value="">Toutes les villes</option>
<option>Abidjan</option>
<option>Bouaké</option>
<option>Yamoussoukro</option>
<option>San Pedro</option>
<option>Korhogo</option>
<option>Daloa</option>
</select>

<button id="btnRecherche">
🔍 Rechercher
</button>
</div>

<br><br>

<h2 style="color:#153A73;">
Résultats de la recherche
</h2>

<br>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;">

<div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

<img src="images/professeur.jpg" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">


<div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

<img src="images/professeur.jpg" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">
<div id="listeEnseignants"
style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;">
</div>
</div>

</div>

  <script type="module">

import { db } from "./js/firebase.js";

import {
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const liste = document.getElementById("listeEnseignants");

async function chargerEnseignants() {

    liste.innerHTML = "";

    const matiere = document.getElementById("matiere").value;
    const niveau = document.getElementById("niveau").value;
    const ville = document.getElementById("ville").value;

    const q = query(
        collection(db, "enseignants"),
        where("verification", "==", true)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docSnap) => {

        const prof = docSnap.data();

        // Filtrage
        if (matiere && prof.matiere !== matiere) return;
        if (niveau && prof.niveau !== niveau) return;
        if (ville && prof.ville !== ville) return;

        liste.innerHTML += `

        <div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

            <img src="${prof.photo || 'images/professeur.jpg'}"
            style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">

            <h3>${prof.nom}</h3>

            <p>📚 ${prof.matiere}</p>

            <p>📍 ${prof.ville}</p>

            <p>🎓 ${prof.niveau}</p>

            <button onclick="location.href='profil-enseignant.html?id=${docSnap.id}'">
                Voir le profil
            </button>

        </div>

        `;

    });

    if (liste.innerHTML === "") {
        liste.innerHTML = `
        <div style="grid-column:1/-1;background:white;padding:30px;border-radius:20px;text-align:center;">
            <h3>Aucun enseignant trouvé</h3>
            <p>Essayez une autre matière, un autre niveau ou une autre ville.</p>
        </div>`;
    }

    }
    document.getElementById("btnRecherche").addEventListener("click", () => {
    chargerEnseignants();
});

chargerEnseignants();
</script>
</body>

</html>
