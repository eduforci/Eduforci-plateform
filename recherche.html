<!DOCTYPE html>
<html lang="fr">

<head>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>

<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recherche de professeurs | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
}

header{

background:#153A73;

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

header img{

height:60px;

}

.container{

max-width:1200px;

margin:40px auto;

padding:20px;

}

.search-box{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}

select,
button{

padding:15px;

border-radius:10px;

font-size:16px;

}

.communes-chips{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.commune-chip{
background:#fff;
color:#153A73;
border:2px solid transparent;
padding:9px 16px;
border-radius:30px;
font-size:13.5px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.commune-chip:hover{
background:#FDB813;
color:#05204E;
}

.commune-chip.actif{
background:#0B63F6;
color:#fff;
border-color:#fff;
}

select{

border:1px solid #ddd;

}

button{

background:#0B63F6;

color:white;

border:none;

cursor:pointer;

font-weight:600;

}

button:hover{

background:#084ec7;

}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>


<header>

<img decoding="async" src="logo.png" alt="EDUFORCI">

</header>

<div class="container">
<h1 style="margin-bottom:25px;color:#153A73;">
🔍 Rechercher un professeur
</h1>

<div class="search-box">

<select id="matiere">
    <option value="">Toutes les matières</option>
</select>
  
<select id="niveau">
    <option value="">Tous les niveaux</option>
</select>

  <select id="ville">
    <option value="">Toutes les villes</option>
  </select>

<button id="btnRecherche">
🔍 Rechercher
</button>
</div>

<div style="margin:20px 0;">

<p style="color:#fff;font-weight:600;margin-bottom:10px;">📍 Communes d'Abidjan :</p>
<div class="communes-chips" id="chipsAbidjan"></div>

<p style="color:#fff;font-weight:600;margin:16px 0 10px;">🏙️ Autres grandes villes :</p>
<div class="communes-chips" id="chipsAutres"></div>

</div>

<br><br>

<h2 style="color:#153A73;">
Résultats de la recherche
</h2>

<br>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;">

<div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

<img loading="lazy" decoding="async" src="images/professeur.jpg" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">


<div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

<img loading="lazy" decoding="async" src="images/professeur.jpg" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">
<div id="listeEnseignants"
style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;">
</div>
</div>

</div>

  <script type="module">

import { db } from "./js/firebase.js";

import {
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { echapperHTML } from "./js/securite.js";

const liste = document.getElementById("listeEnseignants");

const COMMUNES_ABIDJAN = ["Abobo","Adjamé","Anyama","Attécoubé","Bingerville","Cocody","Koumassi","Marcory","Plateau","Port-Bouët","Songon","Treichville","Yopougon"];
const AUTRES_VILLES = ["Bouaké","Yamoussoukro","San-Pédro","Korhogo","Daloa","Man"];

function normaliser(texte) {
    return (texte || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function afficherChips() {

    const zoneAbidjan = document.getElementById("chipsAbidjan");
    const zoneAutres = document.getElementById("chipsAutres");
    const villeActuelle = new URLSearchParams(window.location.search).get("ville") || "";

    COMMUNES_ABIDJAN.forEach((commune) => {
        const chip = document.createElement("button");
        chip.className = "commune-chip" + (normaliser(commune) === normaliser(villeActuelle) ? " actif" : "");
        chip.textContent = commune;
        chip.addEventListener("click", () => selectionnerVille(commune));
        zoneAbidjan.appendChild(chip);
    });

    AUTRES_VILLES.forEach((ville) => {
        const chip = document.createElement("button");
        chip.className = "commune-chip" + (normaliser(ville) === normaliser(villeActuelle) ? " actif" : "");
        chip.textContent = ville;
        chip.addEventListener("click", () => selectionnerVille(ville));
        zoneAutres.appendChild(chip);
    });

}

function selectionnerVille(ville) {
    document.querySelectorAll(".commune-chip").forEach((c) => {
        c.classList.toggle("actif", normaliser(c.textContent) === normaliser(ville));
    });
    document.getElementById("ville").value = "";
    window.villeChipSelectionnee = ville;
    chargerEnseignants();
    document.getElementById("listeEnseignants").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function chargerFiltres() {

    const matiereSelect = document.getElementById("matiere");
    const niveauSelect = document.getElementById("niveau");
    const villeSelect = document.getElementById("ville");

    const matieres = new Set();
    const niveaux = new Set();
    const villes = new Set();

    const q = query(
        collection(db, "enseignants"),
        where("verification", "==", true)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docSnap) => {

        const prof = docSnap.data();

        if (prof.matiere) matieres.add(prof.matiere);
        if (prof.niveau) niveaux.add(prof.niveau);
        if (prof.ville) villes.add(prof.ville);

    });

    [...matieres].sort().forEach((m) => {
        matiereSelect.innerHTML += `<option value="${echapperHTML(m)}">${echapperHTML(m)}</option>`;
    });

    [...niveaux].sort().forEach((n) => {
        niveauSelect.innerHTML += `<option value="${echapperHTML(n)}">${echapperHTML(n)}</option>`;
    });

    [...villes].sort().forEach((v) => {
        villeSelect.innerHTML += `<option value="${echapperHTML(v)}">${echapperHTML(v)}</option>`;
    });

    }
async function chargerEnseignants() {

    liste.innerHTML = "";

    const matiere = document.getElementById("matiere").value;
    const niveau = document.getElementById("niveau").value;
    const villeDropdown = document.getElementById("ville").value;
    const ville = villeDropdown || window.villeChipSelectionnee || "";
    const villeNormalisee = normaliser(ville);

    const q = query(
        collection(db, "enseignants"),
        where("verification", "==", true)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach((docSnap) => {

        const prof = docSnap.data();

        // Filtrage
        if (matiere && prof.matiere !== matiere) return;
        if (niveau && prof.niveau !== niveau) return;
        if (ville && !normaliser(prof.ville).includes(villeNormalisee)) return;

        liste.innerHTML += `

        <div style="background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;">

            <img loading="lazy" decoding="async" src="${echapperHTML(prof.photo || 'images/professeur.jpg')}"
            style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #0B63F6;">

            <h3>${echapperHTML(prof.nom)}</h3>

            <p>📚 ${echapperHTML(prof.matiere)}</p>

            <p>📍 ${echapperHTML(prof.ville)}</p>

            <p>🎓 ${echapperHTML(prof.niveau)}</p>

            <button onclick="location.href='profil-enseignant.html?id=${docSnap.id}'">
                Voir le profil
            </button>

        </div>

        `;

    });

    if (liste.innerHTML === "") {
        liste.innerHTML = `
        <div style="grid-column:1/-1;background:white;padding:30px;border-radius:20px;text-align:center;">
            <h3>Aucun enseignant trouvé</h3>
            <p>Essayez une autre matière, un autre niveau ou une autre ville.</p>
        </div>`;
    }

    }
    document.getElementById("btnRecherche").addEventListener("click", () => {
    chargerEnseignants();
});

document.getElementById("ville").addEventListener("change", () => {
    window.villeChipSelectionnee = null;
    document.querySelectorAll(".commune-chip").forEach((c) => c.classList.remove("actif"));
});

afficherChips();

const villeDepuisUrl = new URLSearchParams(window.location.search).get("ville");
if (villeDepuisUrl) window.villeChipSelectionnee = villeDepuisUrl;

await chargerFiltres();
await chargerEnseignants();
</script>
</body>

</html>
