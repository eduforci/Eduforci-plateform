<!DOCTYPE html>
<html lang="fr">

<head>
<script src="js/notify.js?v=4"></script>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nos enseignants | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
}

header{

background:#153A73;

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

header img{

height:60px;

}

.container{

max-width:1200px;

margin:40px auto;

padding:20px;

}

.title{

text-align:center;

margin-bottom:40px;

}

.title h1{

color:#153A73;

margin-bottom:10px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:30px;

}

.card{

background:white;

border-radius:20px;

padding:25px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.avatar-circle{
    width:130px;
    height:130px;
    margin:0 auto 15px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #eaf1ff;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.avatar-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.badge{

display:inline-block;

background:#28a745;

color:white;

padding:6px 14px;

border-radius:20px;

font-size:14px;

margin:10px 0;

}

.badge.attente{

background:#e08b00;

}

button{

width:100%;

padding:14px;

margin-top:15px;

background:#0B63F6;

color:white;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.empty{

grid-column:1/-1;

text-align:center;

padding:60px 20px;

color:#999;

background:white;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

</style>

</head>

<body>
<a href="index.html" title="Retour à l'accueil" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">🏠 Accueil</a>


<header>

<img src="logo.png" alt="EDUFORCI">

</header>

<div class="container">

<div class="title">

<h1 id="titrePage">Nos enseignants</h1>

<p id="sousTitrePage">
Découvrez tous les enseignants inscrits sur EDUFORCI.
</p>

</div>

<div class="grid" id="listeEnseignants">

<p class="empty">Chargement des enseignants...</p>

</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const liste = document.getElementById("listeEnseignants");

function formaterTarif(tarif, tarifType) {
    const nombre = Number(tarif);
    if (!nombre || nombre <= 0) return "Tarif à discuter";
    return nombre.toLocaleString("fr-FR") + " FCFA / " + (tarifType === "mois" ? "mois" : "heure");
}

function afficherEnseignants(liste_a_afficher) {

    if (liste_a_afficher.length === 0) {
        liste.innerHTML = `<div class="empty">Aucun enseignant inscrit pour le moment.</div>`;
        return;
    }

    liste.innerHTML = "";

    liste_a_afficher.forEach((item) => {

        const prof = item.data;
        const docId = item.id;
        const initiales = (prof.nom || "??").split(" ").map(m => m[0]).join("").substring(0, 2).toUpperCase();

        const carte = document.createElement("div");
        carte.className = "card";

        carte.innerHTML = `
            <div class="avatar-circle">${prof.photo ? `<img src="${prof.photo}" alt="${prof.nom || 'Enseignant'}">` : initiales}</div>
            <h2>${prof.nom || "Enseignant"}</h2>
            <span class="badge ${prof.verification ? "" : "attente"}">${prof.verification ? "✔ Profil vérifié" : "⏳ En attente de vérification"}</span>
            <div class="teacher-badges">
                <span class="badge-item badge-matiere"><i class="fas fa-book"></i> ${prof.matiere || "-"}</span>
                <span class="badge-item badge-lieu"><i class="fas fa-map-marker-alt"></i> ${prof.ville || "-"}</span>
                <span class="badge-item badge-tarif"><i class="fas fa-coins"></i> ${formaterTarif(prof.tarif, prof.tarifType)}</span>
            </div>
            <p><strong>🎓 Niveau :</strong> ${prof.niveau || "-"}</p>
            <p style="color:${prof.disponible !== false ? "#28a745" : "#d93025"};"><strong>${prof.disponible !== false ? "🟢 Disponible" : "🔴 Non disponible"}</strong></p>
            <button onclick="location.href='profil-enseignant.html?id=${docId}'">Voir le profil</button>
        `;

        liste.appendChild(carte);

    });

}

async function chargerEnseignants() {

    try {

        const snapshot = await getDocs(query(collection(db, "enseignants"), where("verification", "==", true)));

        if (snapshot.empty) {
            liste.innerHTML = `<div class="empty">Aucun enseignant inscrit pour le moment.</div>`;
            return;
        }

        const tousLesEnseignants = [];
        snapshot.forEach((docSnap) => {
            tousLesEnseignants.push({ id: docSnap.id, data: docSnap.data() });
        });

        afficherEnseignants(tousLesEnseignants);

    } catch (error) {
        liste.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

chargerEnseignants();

</script>
</body>

</html>
