<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nos enseignants | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
}

header{

background:#153A73;

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

header img{

height:60px;

}

.container{

max-width:1200px;

margin:40px auto;

padding:20px;

}

.title{

text-align:center;

margin-bottom:40px;

}

.title h1{

color:#153A73;

margin-bottom:10px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:30px;

}

.card{

background:white;

border-radius:20px;

padding:25px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.avatar-circle{

width:130px;

height:130px;

margin:0 auto 15px;

border-radius:50%;

background:#0B63F6;

color:white;

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

font-weight:700;

overflow:hidden;

border:3px solid #eaf1ff;

}

.avatar-circle img{

width:100%;

height:100%;

object-fit:cover;

}

.badge{

display:inline-block;

background:#28a745;

color:white;

padding:6px 14px;

border-radius:20px;

font-size:14px;

margin:10px 0;

}

.badge.attente{

background:#e08b00;

}

button{

width:100%;

padding:14px;

margin-top:15px;

background:#0B63F6;

color:white;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.empty{

grid-column:1/-1;

text-align:center;

padding:60px 20px;

color:#999;

background:white;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

</style>

</head>

<body>
<a href="index.html" onclick="if(document.referrer && document.referrer.indexOf(window.location.host) !== -1 && window.history.length>1){history.back();return false;}" title="Retour" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Retour</a>


<header>

<img src="logo.png" alt="EDUFORCI">

</header>

<div class="container">

<div class="title">

<h1>Nos enseignants</h1>

<p>
Choisissez le professeur qui correspond le mieux à vos besoins.
</p>

</div>

<div class="filtres" style="background:white;padding:20px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">

<select id="filtreMatiere">
<option value="">Matière</option>
<option>Français</option>
<option>Anglais</option>
<option>Espagnol</option>
<option>Allemand</option>
<option>Mathématiques</option>
<option>Histoire-Géographie</option>
<option>SVT</option>
<option>Physique-Chimie</option>
<option>Philosophie</option>
</select>

<select id="filtreNiveau">
<option value="">Niveau</option>
<optgroup label="Primaire">
<option>CP1</option>
<option>CP2</option>
<option>CE1</option>
<option>CE2</option>
<option>CM1</option>
<option>CM2</option>
</optgroup>
<optgroup label="1er cycle">
<option>6e</option>
<option>5e</option>
<option>4e</option>
<option>3e</option>
</optgroup>
<optgroup label="2nd cycle">
<option>2nde A</option>
<option>2nde C</option>
<option>1ère A</option>
<option>1ère C</option>
<option>1ère D</option>
<option>Tle A</option>
<option>Tle C</option>
<option>Tle D</option>
</optgroup>
<option value="autre">Autre (à préciser)</option>
</select>

<input type="text" id="niveauAutre" placeholder="Précisez le niveau" style="display:none;padding:14px;border:1px solid #ddd;border-radius:10px;font-size:15px;">

<select id="typeLieu">
<option value="ville">Ville</option>
<option value="commune">Commune</option>
</select>

<select id="filtreLieu">
<option value="">Choisir...</option>
</select>

<button id="btnFiltrer" style="padding:14px 22px;background:#0B63F6;color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer;">Filtrer</button>

</div>

<div class="grid" id="listeEnseignants">

<p class="empty">Chargement des enseignants...</p>

</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { VILLES, COMMUNES } from "./js/lieux.js";

const liste = document.getElementById("listeEnseignants");
let tousLesEnseignants = [];

function formaterTarif(tarif) {
    const nombre = Number(tarif);
    if (!nombre || nombre <= 0) return "Tarif à discuter";
    return nombre.toLocaleString("fr-FR") + " FCFA / heure";
}

function afficherEnseignants(liste_a_afficher) {

    if (liste_a_afficher.length === 0) {
        liste.innerHTML = `<div class="empty">Aucun enseignant ne correspond à votre recherche.</div>`;
        return;
    }

    liste.innerHTML = "";

    liste_a_afficher.forEach((item) => {

        const prof = item.data;
        const docId = item.id;
        const initiales = (prof.nom || "??").split(" ").map(m => m[0]).join("").substring(0, 2).toUpperCase();

        const carte = document.createElement("div");
        carte.className = "card";

        carte.innerHTML = `
            <div class="avatar-circle">${prof.photo ? `<img src="${prof.photo}" alt="${prof.nom || 'Enseignant'}">` : initiales}</div>
            <h2>${prof.nom || "Enseignant"}</h2>
            <span class="badge ${prof.verification ? "" : "attente"}">${prof.verification ? "✔ Profil vérifié" : "⏳ En attente de vérification"}</span>
            <p><strong>📚 Matière :</strong> ${prof.matiere || "-"}</p>
            <p><strong>📍 Ville :</strong> ${prof.ville || "-"}</p>
            <p><strong>🎓 Niveau :</strong> ${prof.niveau || "-"}</p>
            <p><strong>💰 Tarif :</strong> ${formaterTarif(prof.tarif)}</p>
            <p style="color:${prof.disponible ? "#28a745" : "#d93025"};"><strong>${prof.disponible ? "🟢 Disponible" : "🔴 Non disponible"}</strong></p>
            <button onclick="location.href='profil-enseignant.html?id=${docId}'">Voir le profil</button>
        `;

        liste.appendChild(carte);

    });

}

function appliquerFiltres() {

    const matiere = document.getElementById("filtreMatiere").value.trim().toLowerCase();
    const niveau = (document.getElementById("filtreNiveau").value === "autre"
        ? document.getElementById("niveauAutre").value
        : document.getElementById("filtreNiveau").value).trim().toLowerCase();
    const lieu = document.getElementById("filtreLieu").value.trim().toLowerCase();

    const filtres = tousLesEnseignants.filter((item) => {
        const p = item.data;
        const matOk = !matiere || (p.matiere || "").toLowerCase().includes(matiere);
        const niveauOk = !niveau || (p.niveau || "").toLowerCase().includes(niveau);
        const lieuOk = !lieu || (p.ville || "").toLowerCase().includes(lieu);
        return matOk && niveauOk && lieuOk;
    });

    afficherEnseignants(filtres);

}

function remplirLieux() {
    const type = document.getElementById("typeLieu").value;
    const liste_lieux = type === "commune" ? COMMUNES : VILLES;
    const selectLieu = document.getElementById("filtreLieu");
    const valeurActuelle = selectLieu.value;
    selectLieu.innerHTML = `<option value="">Choisir...</option>` + liste_lieux.map(l => `<option ${l === valeurActuelle ? "selected" : ""}>${l}</option>`).join("");
}

async function chargerEnseignants() {

    try {

        const snapshot = await getDocs(query(collection(db, "enseignants"), where("verification", "==", true)));

        if (snapshot.empty) {
            liste.innerHTML = `<div class="empty">Aucun enseignant approuvé pour le moment.</div>`;
            return;
        }

        tousLesEnseignants = [];
        snapshot.forEach((docSnap) => {
            tousLesEnseignants.push({ id: docSnap.id, data: docSnap.data() });
        });

        // Pré-remplissage des filtres depuis l'URL (venant de la page d'accueil)
        const params = new URLSearchParams(window.location.search);

        if (params.get("matiere")) document.getElementById("filtreMatiere").value = params.get("matiere");

        if (params.get("niveau")) {
            const selectNiveau = document.getElementById("filtreNiveau");
            const correspond = Array.from(selectNiveau.options).some(o => o.value === params.get("niveau"));
            if (correspond) {
                selectNiveau.value = params.get("niveau");
            } else {
                selectNiveau.value = "autre";
                document.getElementById("niveauAutre").style.display = "block";
                document.getElementById("niveauAutre").value = params.get("niveau");
            }
        }

        if (params.get("ville")) {
            if (COMMUNES.includes(params.get("ville"))) {
                document.getElementById("typeLieu").value = "commune";
            }
            remplirLieux();
            document.getElementById("filtreLieu").value = params.get("ville");
        }

        appliquerFiltres();

    } catch (error) {
        liste.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

remplirLieux();
document.getElementById("typeLieu").addEventListener("change", remplirLieux);

document.getElementById("filtreNiveau").addEventListener("change", () => {
    document.getElementById("niveauAutre").style.display = document.getElementById("filtreNiveau").value === "autre" ? "block" : "none";
});

document.getElementById("btnFiltrer").addEventListener("click", appliquerFiltres);

// Dès que l'utilisateur choisit sa ville ou sa commune, on filtre directement
document.getElementById("filtreLieu").addEventListener("change", () => {
    if (document.getElementById("filtreLieu").value) {
        appliquerFiltres();
    }
});

}

chargerEnseignants();

</script>
</body>

</html>
