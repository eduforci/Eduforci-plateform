<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;
display:flex;
}

.sidebar{
width:260px;
height:100vh;
background:#153A73;
color:white;
padding:30px 20px;
position:fixed;
top:0;
left:0;
}

.sidebar img{
height:65px;
display:block;
margin:auto;
margin-bottom:25px;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:10px;
text-decoration:none;
color:white;
transition:.3s;
}

.sidebar a:hover{
background:#0B63F6;
}

.sidebar a.active{
background:#0B63F6;
}

.main{
margin-left:260px;
padding:35px;
width:100%;
}

.welcome{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:30px;
}

.message-item{
padding:20px;
border-radius:15px;
background:#f8f9fc;
border-left:5px solid #0B63F6;
margin-bottom:15px;
}

.message-item .meta{
color:#666;
font-size:13px;
margin-bottom:8px;
}

.message-item .contenu{
color:#153A73;
font-size:15px;
line-height:1.6;
}

.vide{
text-align:center;
padding:40px 20px;
color:#666;
}

.vide a{
color:#0B63F6;
font-weight:600;
text-decoration:none;
}


.menu-toggle{display:none;position:fixed;top:20px;left:20px;z-index:100000;background:#153A73;color:#fff;border:none;width:48px;height:48px;border-radius:12px;font-size:20px;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.25);cursor:pointer;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9998;}
@media (max-width:900px){
.menu-toggle{display:flex;}
.sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:9999;}
.sidebar.ouvert{transform:translateX(0);}
.sidebar-overlay.ouvert{display:block;}
.main{margin-left:0!important;padding:20px!important;padding-top:85px!important;max-width:100%!important;}
}
</style>

</head>

<body>
<a href="index.html" onclick="if(document.referrer && document.referrer.indexOf(window.location.host) !== -1 && window.history.length>1){history.back();return false;}" title="Retour" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Retour</a>

<img src="logo.png" alt="EDUFORCI">

<div class="main">

<div class="welcome">

<h1>💬 Mes messages</h1>

<p>Retrouvez ici les messages que vous avez envoyés aux enseignants.</p>

</div>

<div class="welcome">

<div id="listeMessages"></div>

<div id="messageVide" class="vide" style="display:none;">

Vous n'avez envoyé aucun message pour le moment. <br><br>

<a href="recherche.html">Trouver un professeur →</a>

</div>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-parent.html";
        return;
    }

    const liste = document.getElementById("listeMessages");
    const messageVide = document.getElementById("messageVide");

    try {

        const q = query(collection(db, "messages"), where("parentId", "==", user.uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            messageVide.style.display = "block";
            return;
        }

        const messages = [];
        snap.forEach((docSnap) => messages.push(docSnap.data()));

        messages.sort((a, b) => new Date(b.dateEnvoi) - new Date(a.dateEnvoi));

        messages.forEach((m) => {

            const date = new Date(m.dateEnvoi).toLocaleString("fr-FR");

            const div = document.createElement("div");
            div.className = "message-item";
            div.innerHTML = `
                <div class="meta">À ${m.enseignantNom || "l'enseignant"} · ${date}</div>
                <div class="contenu">${m.contenu}</div>
            `;
            liste.appendChild(div);

        });

    } catch (error) {
        alert(error.message);
    }

});

</script>


<script>
(function(){
  const btn = document.getElementById("menuToggleEduforci");
  const overlay = document.getElementById("sidebarOverlayEduforci");
  const sidebar = document.querySelector(".sidebar");
  if(!btn||!sidebar) return;
  function ouvrir(){ sidebar.classList.add("ouvert"); overlay.classList.add("ouvert"); }
  function fermer(){ sidebar.classList.remove("ouvert"); overlay.classList.remove("ouvert"); }
  btn.addEventListener("click", function(){ sidebar.classList.contains("ouvert") ? fermer() : ouvrir(); });
  overlay.addEventListener("click", fermer);
  sidebar.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", fermer); });
})();
</script>
</body>
