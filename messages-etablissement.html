<!DOCTYPE html>
<html lang="fr">
<head>
<script src="js/notify.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(rgba(5,32,78,.78),rgba(5,32,78,.78)),url("hero.jpg") center center/cover fixed no-repeat;display:flex;}

.sidebar{width:260px;height:100vh;background:#153A73;color:white;padding:30px 20px;position:fixed;top:0;left:0;overflow-y:auto;}
.sidebar img{height:65px;display:block;margin:auto;margin-bottom:25px;}
.sidebar a{display:block;color:white;text-decoration:none;padding:14px;margin-bottom:8px;border-radius:10px;transition:.3s;}
.sidebar a:hover{background:#0B63F6;}
.sidebar a.active{background:#0B63F6;}

.main{margin-left:260px;padding:35px;width:100%;max-width:800px;}

h1{color:#153A73;margin-bottom:20px;}

.message{background:white;padding:22px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:18px;}
.message .meta{color:#999;font-size:13px;margin-bottom:8px;}
.message p{color:#333;line-height:1.6;}
.reponse{margin-top:12px;padding-top:12px;border-top:1px solid #eee;color:#153A73;background:#eaf1ff;padding:12px;border-radius:10px;}

.empty{background:white;padding:40px;border-radius:20px;text-align:center;color:#999;box-shadow:0 10px 25px rgba(0,0,0,.08);}


.menu-toggle{display:none;position:fixed;top:20px;left:20px;z-index:100000;background:#153A73;color:#fff;border:none;width:48px;height:48px;border-radius:12px;font-size:20px;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.25);cursor:pointer;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9998;}
@media (max-width:900px){
.menu-toggle{display:flex;}
.sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:9999;}
.sidebar.ouvert{transform:translateX(0);}
.sidebar-overlay.ouvert{display:block;}
.main{margin-left:0!important;padding:20px!important;padding-top:85px!important;max-width:100%!important;}
}
</style>

</head>
<body>
<a href="index.html" onclick="if(document.referrer && document.referrer.indexOf(window.location.host) !== -1 && window.history.length>1){history.back();return false;}" title="Retour" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Retour</a>


<button class="menu-toggle" id="menuToggleEduforci" aria-label="Menu">☰</button>
<div class="sidebar-overlay" id="sidebarOverlayEduforci"></div>
<div class="sidebar">
<img src="logo.png" alt="EDUFORCI">
<a href="dashboard-etablissement.html">🏠 Tableau de bord</a>
<a href="publier-offre.html">📢 Publier une offre</a>
<a href="recherche-enseignant-etablissement.html">👨‍🏫 Rechercher un enseignant</a>
<a href="candidatures-etablissement.html">📩 Candidatures reçues</a>
<a href="messages-etablissement.html" class="active">💬 Messages</a>
<a href="mon-etablissement.html">🏫 Mon établissement</a>
<a href="parametres-etablissement.html">⚙️ Paramètres</a>
<a href="#" id="btnDeconnexion">🚪 Déconnexion</a>
</div>

<div class="main">

<h1>💬 Mes messages envoyés</h1>

<div id="listeMessages"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { echapperHTML } from "./js/securite.js";

async function chargerMessages(uid) {

    const container = document.getElementById("listeMessages");
    container.innerHTML = "";

    try {

        const q = query(collection(db, "messages"), where("etablissementId", "==", uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            container.innerHTML = `<div class="empty">Vous n'avez envoyé aucun message pour le moment.<br>Contactez un enseignant depuis "Rechercher un enseignant".</div>`;
            return;
        }

        snap.forEach((docSnap) => {

            const d = docSnap.data();
            const date = d.dateEnvoi ? new Date(d.dateEnvoi).toLocaleString("fr-FR") : "";

            const el = document.createElement("div");
            el.className = "message";

            el.innerHTML = `
                <div class="meta">${date}</div>
                <p>${echapperHTML(d.contenu || "")}</p>
                ${d.reponseEnseignant ? `<div class="reponse"><strong>Réponse de l'enseignant :</strong> ${echapperHTML(d.reponseEnseignant)}</div>` : ""}
            `;
            container.appendChild(el);
        });

    } catch (error) {
        container.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "connexion-etablissement.html";
        return;
    }

    chargerMessages(user.uid);

});

document.getElementById("btnDeconnexion").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "connexion-etablissement.html";
});

</script>


<script>
(function(){
  const btn = document.getElementById("menuToggleEduforci");
  const overlay = document.getElementById("sidebarOverlayEduforci");
  const sidebar = document.querySelector(".sidebar");
  if(!btn||!sidebar) return;
  function ouvrir(){ sidebar.classList.add("ouvert"); overlay.classList.add("ouvert"); }
  function fermer(){ sidebar.classList.remove("ouvert"); overlay.classList.remove("ouvert"); }
  btn.addEventListener("click", function(){ sidebar.classList.contains("ouvert") ? fermer() : ouvrir(); });
  overlay.addEventListener("click", fermer);
  sidebar.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", fermer); });
})();
</script>
</body>
</html>
