<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription Parent | EDUFORCI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(rgba(8,34,88,.85),rgba(8,34,88,.85)),url("hero.jpg");

background-size:cover;

background-position:center;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.form-box{

background:#fff;

width:430px;

padding:35px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.logo{

display:block;

margin:auto;

height:70px;

margin-bottom:20px;

}

h2{

text-align:center;

color:#0B63F6;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#0B63F6;

color:#fff;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#084ec7;

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

display:block;

margin:8px 0;

text-decoration:none;

color:#0B63F6;

}

</style>

</head>

<body>
<a href="index.html" onclick="if(document.referrer && document.referrer.indexOf(window.location.host) !== -1 && window.history.length>1){history.back();return false;}" title="Retour" style="position:fixed;top:20px;right:20px;background:#153A73;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:99999;display:flex;align-items:center;gap:6px;">← Retour</a>


<form class="form-box" id="formInscription">

<img src="logo.png" class="logo" alt="EDUFORCI">

<h2>Inscription Parent</h2>

<input type="text" id="nom" placeholder="Nom et prénom">

<input type="tel" id="telephone" placeholder="Téléphone">

<input type="email" id="email" placeholder="Adresse e-mail">

<input type="password" id="password" placeholder="Créer un mot de passe">

<input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe">

<button type= "submit" id="btnInscription">Créer mon compte</button>

<div class="links">

<a href="connexion-parent.html">J'ai déjà un compte</a>

</div>

</form>
<script type="module">

import { creerCompteParent } from "./js/auth.js";

const form = document.getElementById("formInscription");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const telephone = document.getElementById("telephone").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    await creerCompteParent(nom, telephone, email, password);

});

</script>
</body>
</html>
