<div class="main">

<h1>⭐ Avis reçus</h1>

<div id="zoneMoyenne"></div>
<div id="listeAvis"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

async function chargerAvis(identifiant) {

    const zoneMoyenne = document.getElementById("zoneMoyenne");
    const container = document.getElementById("listeAvis");
    container.innerHTML = "";
    zoneMoyenne.innerHTML = "";

    if (!identifiant) {
        container.innerHTML = `<div class="empty">Complétez d'abord votre profil (identifiant enseignant manquant) pour recevoir des avis.</div>`;
        return;
    }

    try {

        const q = query(collection(db, "avis"), where("enseignantId", "==", identifiant));
        const snap = await getDocs(q);

        if (snap.empty) {
            container.innerHTML = `<div class="empty">Aucun avis pour le moment.</div>`;
            return;
        }

        let total = 0;
        let count = 0;

        snap.forEach((docSnap) => {

            const d = docSnap.data();
            const note = Number(d.note) || 0;
            total += note;
            count++;

            const el = document.createElement("div");
            el.className = "avis";

            el.innerHTML = `
                <div class="haut">
                    <span class="parent">${d.parentNom || "Parent"}</span>
                    <span class="etoiles">${"⭐".repeat(note)}</span>
                </div>
                <p>${d.commentaire || ""}</p>
            `;

            container.appendChild(el);
        });

        const moyenne = count > 0 ? (total / count).toFixed(1) : "0";

        zoneMoyenne.innerHTML = `
            <div class="moyenne">
                <div class="note">${moyenne} / 5</div>
                <p>${count} avis reçu(s)</p>
            </div>
        `;

    } catch (error) {
        container.innerHTML = `<div class="empty">Erreur lors du chargement : ${error.message}</div>`;
    }

}

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "connexion-enseignant.html";
        return;
    }

    const snap = await getDoc(doc(db, "enseignants", user.uid));
    const identifiant = snap.exists() ? snap.data().identifiant : null;

    chargerAvis(identifiant);

});

document.getElementById("btnDeconnexion").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "connexion-enseignant.html";
});

</script>
